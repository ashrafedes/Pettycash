<!DOCTYPE html>
<html lang='en' dir='ltr'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name='description' content='Petty Cash pricing plans.'>
  <title data-i18n='pricing.title'>Pricing - Petty Cash</title>
  <link rel='icon' type='image/png' href='./images/favicon.png'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
  <script src='https://cdn.tailwindcss.com'></script>
  <link rel='stylesheet' href='./css/styles.css'>
</head>
<body class='min-h-screen flex flex-col bg-white'>
  <div id='navbar'></div>
  <main class='flex-1'>
    <section class='bg-gradient-to-br from-blue-600 to-indigo-700 text-white py-16 text-center'>
      <div class='max-w-2xl mx-auto px-4 sm:px-6'>
        <h1 data-i18n='pricing.title' class='text-3xl sm:text-4xl font-extrabold mb-3'></h1>
        <p data-i18n='pricing.subtitle' class='text-blue-100 text-lg'></p>
      </div>
    </section>
    <section class='py-16 sm:py-20 bg-slate-50'>
      <div class='max-w-6xl mx-auto px-4 sm:px-6'>
        <div id='pricing-grid' class='grid sm:grid-cols-2 lg:grid-cols-4 gap-5 items-start'></div>
        <p id='pricing-note' class='text-center text-slate-400 text-sm mt-10'></p>
      </div>
    </section>
  </main>
  <div id='footer'></div>
  <script src='./js/translations.js'></script>
  <script src='./js/main.js'></script>
  <script src='./js/pricing.js'></script>
</body>
</html>
