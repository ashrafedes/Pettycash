<!DOCTYPE html>
<html lang='en' dir='ltr'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name='description' content='Petty Cash blog article.'>
  <title>Article - Petty Cash</title>
  <link rel='icon' type='image/png' href='./images/favicon.png'>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
  <script src='https://cdn.tailwindcss.com'></script>
  <script src='https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js'></script>
  <script src='https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js'></script>
  <link rel='stylesheet' href='./css/styles.css'>
</head>
<body class='min-h-screen flex flex-col bg-white'>
  <div id='navbar'></div>
  <main class='flex-1'>
    <section id='article-hero' class='bg-gradient-to-br from-blue-600 to-indigo-700 text-white py-16 text-center hidden'>
      <div class='max-w-3xl mx-auto px-4 sm:px-6'>
        <div id='article-meta' class='text-blue-100 text-sm mb-3'></div>
        <h1 id='article-title' class='text-3xl sm:text-4xl font-extrabold mb-4'></h1>
      </div>
    </section>
    <section class='py-12 sm:py-16 bg-white'>
      <div class='max-w-3xl mx-auto px-4 sm:px-6'>
        <div id='article-image' class='mb-8 rounded-2xl overflow-hidden hidden'></div>
        <div id='article-content' class='prose prose-slate max-w-none'></div>
        <div id='article-not-found' class='text-center py-20 hidden'>
          <p class='text-slate-500 text-lg'>Article not found.</p>
          <a href='./blog.html' class='mt-4 inline-flex items-center text-blue-600 font-semibold hover:underline'>Back to blog</a>
        </div>
      </div>
    </section>
  </main>
  <div id='footer'></div>
  <script src='./js/translations.js'></script>
  <script src='./js/firebase.js'></script>
  <script src='./js/main.js'></script>
  <script src='./js/article.js'></script>
</body>
</html>
