<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Petty Cash - Get in touch with us.">
  <title>Contact Us - Petty Cash</title>
  <link rel="icon" type="image/png" href="./images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="min-h-screen flex flex-col bg-white">
  <div id="navbar"></div>

  <main class="flex-1">
    <section class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white py-16 text-center">
      <div class="max-w-2xl mx-auto px-4 sm:px-6">
        <h1 class="text-3xl sm:text-4xl font-extrabold mb-3">Contact Us</h1>
        <p class="text-blue-100 text-lg">We usually reply within a few hours.</p>
      </div>
    </section>

    <section class="py-16 sm:py-20 bg-slate-50">
      <div class="max-w-5xl mx-auto px-4 sm:px-6">
        <div class="grid sm:grid-cols-5 gap-10 items-start">
          <!-- Info sidebar -->
          <div class="sm:col-span-2 space-y-5">
            <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-start gap-4 shadow-sm">
              <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center shrink-0">
                <svg class="text-blue-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              </div>
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Email</p>
                <a href="mailto:ashrafede@gmail.com" class="text-sm font-semibold text-blue-600 hover:underline">ashrafede@gmail.com</a>
              </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-start gap-4 shadow-sm">
              <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center shrink-0">
                <svg class="text-blue-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              </div>
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Support Hours</p>
                <p class="text-sm font-medium text-slate-700">Sun – Thu, 9 AM – 6 PM (AST)</p>
              </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-start gap-4 shadow-sm">
              <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center shrink-0">
                <svg class="text-blue-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              </div>
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Location</p>
                <p class="text-sm font-medium text-slate-700">Saudi Arabia 🇸🇦</p>
              </div>
            </div>
          </div>

          <!-- Form -->
          <div class="sm:col-span-3 bg-white border border-slate-200 rounded-2xl p-7 shadow-sm">
            <div id="contact-success" class="hidden text-center py-10">
              <svg class="text-green-500 mx-auto mb-4" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              <p class="font-bold text-slate-900 text-lg mb-2">Message sent! We will get back to you soon.</p>
              <button id="send-another" class="mt-4 text-sm text-blue-600 hover:underline">Send another message</button>
            </div>

            <div id="contact-error" class="hidden flex items-start gap-3 bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
              <svg class="text-red-500 shrink-0 mt-0.5" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
              <div>
                <p class="text-sm font-semibold text-red-700">Failed to send. Please try again or email us directly.</p>
              </div>
            </div>

            <form id="contact-form" class="space-y-4">
              <div id="contact-form-fields" class="space-y-4">
                <div class="grid sm:grid-cols-2 gap-4">
                  <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Your Name *</label>
                    <input type="text" name="name" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                  </div>
                  <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Email Address *</label>
                    <input type="email" name="email" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                  </div>
                </div>

                <div>
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Subject</label>
                  <input type="text" name="subject" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                </div>

                <div>
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Message *</label>
                  <textarea name="message" required rows="5" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-shadow"></textarea>
                </div>
              </div>

              <button type="submit" class="w-full flex items-center justify-center gap-2 bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition-colors disabled:opacity-60 text-sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                Send Message
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <script src="./js/main.js"></script>
  <script src="./js/contact.js"></script>
</body>
</html>
