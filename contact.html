<body class='min-h-screen flex flex-col bg-white'>
  <div id='navbar'></div>
  <main class='flex-1'>
    <section class='bg-gradient-to-br from-blue-600 to-indigo-700 text-white py-16 text-center'>
      <div class='max-w-2xl mx-auto px-4 sm:px-6'>
        <h1 data-i18n='contact.title' class='text-3xl sm:text-4xl font-extrabold mb-3'>Contact PettyCash</h1>
        <p data-i18n='contact.subtitle' class='text-blue-100 text-lg'></p>
      </div>
    </section>
    <section class='py-16 sm:py-20 bg-slate-50'>
      <div class='max-w-2xl mx-auto px-4 sm:px-6'>
        <div class='bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8'>
          <div class='text-center mb-6'>
            <p class='text-sm text-slate-500'>Email us at <a id='contact-email' href='mailto:ashrafede@gmail.com' class='text-blue-600 font-medium'></a></p>
          </div>
          <form id='contact-form' class='space-y-4'>
            <div>
              <label data-i18n='contact.name' class='block text-sm font-medium text-slate-700 mb-1'></label>
              <input type='text' name='name' required class='w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none'>
            </div>
            <div>
              <label data-i18n='contact.email' class='block text-sm font-medium text-slate-700 mb-1'></label>
              <input type='email' name='email' required class='w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none'>
            </div>
            <div>
              <label data-i18n='contact.subject' class='block text-sm font-medium text-slate-700 mb-1'></label>
              <input type='text' name='subject' required class='w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none'>
            </div>
            <div>
              <label data-i18n='contact.message' class='block text-sm font-medium text-slate-700 mb-1'></label>
              <textarea name='message' rows='4' required class='w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none'></textarea>
            </div>
            <button id='submit-btn' type='submit' class='w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2'>
              <span id='btn-text' data-i18n='contact.send'></span>
              <span id='btn-spinner' class='hidden inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin'></span>
            </button>
          </form>
          <div id='form-status' class='mt-4 text-center'></div>
        </div>
      </div>
    </section>
  </main>
  <div id='footer'></div>
