<body class='min-h-screen flex flex-col bg-slate-50'>
  <div id='navbar'></div>
  <main class='flex-1'>
    <!-- Login -->
    <section id='login-section' class='min-h-[60vh] flex items-center justify-center py-12'>
      <div class='max-w-md w-full mx-auto px-4 sm:px-6'>
        <div class='bg-white border border-slate-200 rounded-2xl p-8 shadow-sm'>
          <div class='text-center mb-6'>
            <div class='w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4'>
              <svg width='28' height='28' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' class='text-blue-600'><rect x='3' y='11' width='18' height='11' rx='2' ry='2'></rect><path d='M7 11V7a5 5 0 0 1 10 0v4'></path></svg>
            </div>
            <h1 class='text-2xl font-bold text-slate-900'>Admin Panel</h1>
            <p class='text-sm text-slate-500 mt-1'>Manage blog articles</p>
          </div>
          <form id='login-form' class='space-y-4'>
            <div>
              <label class='block text-sm font-medium text-slate-700 mb-1'>Password</label>
              <input type='password' id='login-password' required class='w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            </div>
            <button type='submit' class='w-full px-4 py-2.5 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors'>Login</button>
          </form>
          <p id='login-error' class='mt-3 text-sm text-red-600 hidden'></p>
        </div>
      </div>
    </section>

    <!-- Admin: Grid View -->
    <section id='grid-view' class='hidden py-8 sm:py-12'>
      <div class='max-w-6xl mx-auto px-4 sm:px-6'>
        <div class='flex items-center justify-between flex-wrap gap-3 mb-6'>
          <div>
            <h1 class='text-2xl font-bold text-slate-900'>Articles</h1>
            <p id='article-count' class='text-sm text-slate-500 mt-0.5'></p>
          </div>
          <div class='flex items-center gap-2'>
            <button type='button' id='settings-btn' class='px-4 py-2 text-sm font-medium text-slate-700 border border-slate-300 rounded-lg hover:bg-white transition-colors'>Settings</button>
            <button id='logout-btn' class='px-4 py-2 text-sm font-medium text-slate-700 border border-slate-300 rounded-lg hover:bg-white transition-colors'>Logout</button>
            <button id='new-article-btn' class='px-4 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-1.5'>
              <svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><line x1='12' y1='5' x2='12' y2='19'></line><line x1='5' y1='12' x2='19' y2='12'></line></svg>
              New Article
            </button>
          </div>
        </div>

        <div id='settings-panel' class='hidden bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-4 mb-6'>
          <h3 class='text-lg font-semibold text-slate-900'>Settings</h3>
          <div>
            <label class='block text-sm font-medium text-slate-700 mb-1'>OpenRouter API Key</label>
            <input type='password' id='openrouter-key' placeholder='sk-or-v1-...' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            <p class='mt-1 text-xs text-slate-500'>Stored in this browser only. Required for translation.</p>
          </div>
          <div id='settings-status' class='text-sm hidden'></div>
          <div class='flex items-center gap-3'>
            <button type='button' id='save-settings-btn' class='px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors'>Save Key</button>
            <button type='button' id='close-settings-btn' class='px-4 py-2 text-slate-700 font-medium border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors'>Close</button>
          </div>
        </div>

        <div class='mb-6'>
          <div class='relative max-w-md'>
            <input type='text' id='admin-search' class='w-full ps-10 pe-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white' placeholder='Search articles...'>
            <svg class='absolute start-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400' xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>
          </div>
        </div>

        <div id='articles-grid' class='grid sm:grid-cols-2 lg:grid-cols-3 gap-5'></div>
      </div>
    </section>

    <!-- Admin: Edit View -->
    <section id='edit-view' class='hidden py-8 sm:py-12'>
      <div class='max-w-3xl mx-auto px-4 sm:px-6'>
        <div class='flex items-center justify-between mb-6'>
          <button id='back-to-grid-btn' class='flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors'>
            <svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><line x1='19' y1='12' x2='5' y2='12'></line><polyline points='12 19 5 12 12 5'></polyline></svg>
            Back to Articles
          </button>
          <h1 id='edit-view-title' class='text-xl font-bold text-slate-900'>New Article</h1>
        </div>

        <form id='article-form' class='bg-white border border-slate-200 rounded-2xl p-6 sm:p-8 shadow-sm space-y-6'>
          <input type='hidden' id='article-id'>

          <div class='grid sm:grid-cols-2 gap-4'>
            <div>
              <label class='block text-sm font-medium text-slate-700 mb-1'>Slug</label>
              <input type='text' id='article-slug' required class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            </div>
            <div>
              <label class='block text-sm font-medium text-slate-700 mb-1'>Date</label>
              <input type='date' id='article-date' required class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            </div>
          </div>

          <div class='flex items-center gap-2'>
            <input type='checkbox' id='article-published' checked class='w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500'>
            <label for='article-published' class='text-sm font-medium text-slate-700'>Published (visible on website)</label>
          </div>

          <div class='grid sm:grid-cols-2 gap-4'>
            <div>
              <label class='block text-sm font-medium text-slate-700 mb-1'>Read Time (minutes)</label>
              <input type='number' id='article-readtime' min='1' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            </div>
            <div>
              <label class='block text-sm font-medium text-slate-700 mb-1'>Image</label>
              <input type='file' id='article-image-file' accept='image/*' class='block w-full text-sm text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100'>
              <p id='upload-status' class='mt-1 text-xs text-slate-500'></p>
              <p class='text-xs text-slate-400 mt-1'>Or paste an image URL below:</p>
              <input type='text' id='article-image-url' placeholder='https://...' class='w-full mt-1 px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm'>
              <img id='image-preview' src='' alt='Preview' class='hidden mt-2 max-h-32 rounded-lg border border-slate-200 object-cover'>
            </div>
          </div>

          <!-- EN / AR Tabs -->
          <div>
            <div class='flex items-center justify-between mb-3'>
              <div class='flex border-b border-slate-200'>
                <button type='button' data-tab='en' class='tab-btn px-5 py-2.5 text-sm font-semibold text-blue-600 border-b-2 border-blue-600'>English</button>
                <button type='button' data-tab='ar' class='tab-btn px-5 py-2.5 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-slate-700'>Arabic</button>
              </div>
              <button type='button' id='translate-ar-btn' class='px-3 py-1.5 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors'>Translate from English</button>
            </div>

            <div id='tab-en' class='tab-panel space-y-3'>
              <input type='text' id='title-en' placeholder='English title' required class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
              <textarea id='summary-en' placeholder='English excerpt' rows='2' required class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'></textarea>
              <textarea id='content-en' placeholder='English content (Markdown)' rows='8' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm'></textarea>
              <input type='text' id='meta-title-en' placeholder='English meta title' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
              <textarea id='meta-description-en' placeholder='English meta description' rows='2' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'></textarea>
              <input type='text' id='keywords-en' placeholder='Keywords (comma-separated)' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            </div>

            <div id='tab-ar' class='tab-panel space-y-3 hidden' dir='rtl'>
              <input type='text' id='title-ar' placeholder='Arabic title' required class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
              <textarea id='summary-ar' placeholder='Arabic excerpt' rows='2' required class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'></textarea>
              <textarea id='content-ar' placeholder='Arabic content (Markdown)' rows='8' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm'></textarea>
              <input type='text' id='meta-title-ar' placeholder='Arabic meta title' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
              <textarea id='meta-description-ar' placeholder='Arabic meta description' rows='2' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'></textarea>
              <input type='text' id='keywords-ar' placeholder='Keywords in Arabic (comma-separated)' class='w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'>
            </div>
            <p id='translate-status' class='mt-2 text-xs text-slate-500'></p>
          </div>

          <div class='flex items-center gap-3 pt-2'>
            <button type='submit' id='save-btn' class='px-6 py-2.5 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors'>Save Article</button>
            <button type='button' id='clear-btn' class='px-6 py-2.5 text-slate-700 font-medium border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors'>Clear</button>
          </div>
          <p id='form-status' class='text-sm'></p>
        </form>
      </div>
    </section>
  </main>
  <div id='footer'></div>
  <script src='./js/translations.js' defer></script>
  <script src='./js/firebase.js?v=3' defer></script>
  <script src='./js/main.js' defer></script>
  <script src='./js/admin.js?v=13' defer></script>
<script defer src="./js/pettycash-widget.js"></script>
<script defer src="./js/ai-assistant.js"></script>
<script defer src="./js/marquee-banner.js?v=4"></script>
</body>
</html>
