<!DOCTYPE html>
<html lang='en' dir='ltr'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name='description' content='Petty Cash Help Center.'>
  <title data-i18n='helpCenter.title'>Help Center - Petty Cash</title>
  <link rel='icon' type='image/png' href='./images/favicon.png'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
  <script src='https://cdn.tailwindcss.com'></script>
  <link rel='stylesheet' href='./css/styles.css'>
</head>
<body class='min-h-screen flex flex-col bg-white'>
  <div id='navbar'></div>
  <main class='flex-1'>
    <section class='bg-gradient-to-br from-blue-600 to-indigo-700 text-white py-16 text-center'>
      <div class='max-w-2xl mx-auto px-4 sm:px-6'>
        <h1 data-i18n='helpCenter.title' class='text-3xl sm:text-4xl font-extrabold mb-3'></h1>
        <p data-i18n='helpCenter.subtitle' class='text-blue-100 text-lg'></p>
      </div>
    </section>
    <section class='py-16 sm:py-20 bg-slate-50'>
      <div class='max-w-3xl mx-auto px-4 sm:px-6'>
        <h2 data-i18n='helpCenter.sections' class='text-xl font-bold text-slate-900 mb-6'></h2>
        <div id='help-sections' class='space-y-3'></div>
      </div>
    </section>
  </main>
  <div id='footer'></div>
  <script src='./js/translations.js'></script>
  <script src='./js/main.js'></script>
  <script src='./js/help.js'></script>
</body>
</html>
