  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'نص إلى PDF', desc: 'تحويل النص إلى PDF. اكتب أو الصق النص، اختر حجم الخط وحجم الصفحة.',
        textLabel: 'أدخل النص', uploadTxt: 'رفع .txt', pageSize: 'حجم الصفحة', orientation: 'الاتجاه',
        portrait: 'عمودي', landscape: 'أفقي', fontSize: 'حجم الخط', margin: 'الهامش (pt)',
        convertBtn: 'تحويل إلى PDF', noText: 'أدخل نصاً أولاً'
      } : {
        title: 'Text to PDF', desc: 'Convert text to PDF. Type or paste text, choose font size and page size.',
        textLabel: 'Enter your text', uploadTxt: 'Upload .txt', pageSize: 'Page size', orientation: 'Orientation',
        portrait: 'Portrait', landscape: 'Landscape', fontSize: 'Font size', margin: 'Margin (pt)',
        convertBtn: 'Convert to PDF', noText: 'Enter some text first'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('text-label').textContent = T.textLabel;
      document.getElementById('upload-txt-label').textContent = T.uploadTxt;
      document.getElementById('page-size-label').textContent = T.pageSize;
      document.getElementById('orientation-label').textContent = T.orientation;
      document.getElementById('opt-portrait').textContent = T.portrait;
      document.getElementById('opt-landscape').textContent = T.landscape;
      document.getElementById('font-size-label').textContent = T.fontSize;
      document.getElementById('margin-label').textContent = T.margin;
      document.getElementById('convert-btn-label').textContent = T.convertBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل التحويل مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يمكنني اختيار حجم الصفحة؟', a: 'نعم، A4 أو US Letter.' },
        { q: 'هل يمكنني رفع ملف نصي؟', a: 'نعم، ارفع ملف .txt أو الصق النص مباشرة.' }
      ] : [
        { q: 'Is Text to PDF free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Can I choose page size?', a: 'Yes, you can choose A4 or US Letter.' },
        { q: 'Can I upload a text file?', a: 'Yes, upload a .txt file or paste text directly.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pdfToText', 'imageToPdf', 'merge', 'compress'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Text to PDF Logic =====================
      let resultBlob = null;
      const convertBtn = document.getElementById('convert-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');
      const textInput = document.getElementById('text-input');

      document.getElementById('upload-txt-btn').addEventListener('click', () => {
        document.getElementById('txt-file').click();
      });

      document.getElementById('txt-file').addEventListener('change', async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const text = await f.text();
        textInput.value = text;
      });

      convertBtn.addEventListener('click', async () => {
        const text = textInput.value.trim();
        if (!text) { PDFTools.toast(T.noText); return; }
        convertBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          const { PDFDocument, StandardFonts, rgb } = await PDFTools.ensurePDFLib();
          const doc = await PDFDocument.create();
          const font = await doc.embedFont(StandardFonts.Helvetica);

          // Sanitize text: replace non-WinAnsi characters with closest equivalent
          function sanitizeForWinAnsi(str) {
            return str.split('').map(ch => {
              const code = ch.charCodeAt(0);
              if (code <= 0x7E) return ch; // ASCII
              if (code >= 0xA0 && code <= 0xFF) return ch; // Latin-1 supplement
              // Common replacements
              const map = {
                '\u2018': "'", '\u2019': "'", '\u201C': '"', '\u201D': '"',
                '\u2013': '-', '\u2014': '-', '\u2026': '...', '\u00A0': ' ',
                '\u2022': '*', '\u25CF': '*', '\u25CB': 'o', '\u25A0': '#',
                '\u2192': '->', '\u2190': '<-', '\u2191': '^', '\u2193': 'v',
                '\u2265': '>=', '\u2264': '<=', '\u2260': '!=', '\u221E': 'inf',
                '\u00B1': '+/-', '\u00D7': 'x', '\u00F7': '/',
                '\u2550': '=', '\u2551': '|', '\u2552': '+', '\u2553': '+',
                '\u2554': '+', '\u2555': '+', '\u2556': '+', '\u2557': '+',
                '\u2558': '+', '\u2559': '+', '\u255A': '+', '\u255B': '+',
                '\u255C': '+', '\u255D': '+', '\u255E': '+', '\u255F': '+',
                '\u2560': '+', '\u2561': '+', '\u2562': '+', '\u2563': '+',
                '\u2564': '+', '\u2565': '+', '\u2566': '+', '\u2567': '+',
                '\u2568': '+', '\u2569': '+', '\u256A': '+', '\u256B': '+',
                '\u256C': '+'
              };
              if (map[ch]) return map[ch];
              // Try to find a similar ASCII character
              return '?';
            }).join('');
          }

          const pageSize = document.getElementById('page-size').value;
          const orientation = document.getElementById('orientation').value;
          const fontSize = parseInt(document.getElementById('font-size').value) || 12;
          const margin = parseInt(document.getElementById('margin').value) || 50;

          let pageW, pageH;
          if (pageSize === 'a4') { pageW = 595.28; pageH = 841.89; }
          else { pageW = 612; pageH = 792; }
          if (orientation === 'landscape') { [pageW, pageH] = [pageH, pageW]; }

          const contentW = pageW - margin * 2;
          const lineHeight = fontSize * 1.4;

          // Word wrap
          const cleanText = sanitizeForWinAnsi(text);
          const lines = [];
          const paragraphs = cleanText.split('\n');
          for (const para of paragraphs) {
            if (!para.trim()) { lines.push(''); continue; }
            const words = para.split(/\s+/);
            let currentLine = '';
            for (const word of words) {
              const testLine = currentLine ? currentLine + ' ' + word : word;
              const testW = font.widthOfTextAtSize(testLine, fontSize);
              if (testW > contentW && currentLine) {
                lines.push(currentLine);
                currentLine = word;
              } else {
                currentLine = testLine;
              }
            }
            if (currentLine) lines.push(currentLine);
          }

          PDFTools.showProgress(progressArea, 30);

          // Paginate
          const linesPerPage = Math.floor((pageH - margin * 2) / lineHeight);
          let page = doc.addPage([pageW, pageH]);
          let y = pageH - margin;
          let lineIdx = 0;

          for (let i = 0; i < lines.length; i++) {
            if (y < margin + lineHeight) {
              page = doc.addPage([pageW, pageH]);
              y = pageH - margin;
            }
            page.drawText(lines[i], {
              x: margin,
              y: y - fontSize,
              size: fontSize,
              font,
              color: rgb(0, 0, 0)
            });
            y -= lineHeight;
            if (i % 50 === 0) PDFTools.showProgress(progressArea, 30 + Math.round((i / lines.length) * 60));
          }

          PDFTools.showProgress(progressArea, 90);
          const out = await doc.save();
          resultBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          convertBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, 'text-to-pdf.pdf');
      });
    });
  </script>
