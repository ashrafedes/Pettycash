  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'حذف الصفحات الفارغة', desc: 'اكتشاف وحذف الصفحات الفارغة من ملف PDF تلقائياً.',
        scanBtn: 'فحص الصفحات الفارغة', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        blankFound: 'صفحة فارغة موجودة', noBlank: 'لا توجد صفحات فارغة', deleteBtn: 'حذف الصفحات الفارغة',
        deleted: 'تم حذف الصفحات الفارغة', keptPages: 'صفحة محتفظ بها'
      } : {
        title: 'Delete Blank Pages', desc: 'Automatically detect and remove blank pages from your PDF.',
        scanBtn: 'Scan for Blank Pages', pageCount: 'pages', noFile: 'Select a PDF file first',
        blankFound: 'blank page(s) found', noBlank: 'No blank pages found', deleteBtn: 'Delete Blank Pages',
        deleted: 'Blank pages deleted', keptPages: 'pages kept'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('scan-btn-label').textContent = T.scanBtn;
      document.getElementById('delete-btn-label').textContent = T.deleteBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل الحذف مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'كيف تُكتشف الصفحات الفارغة؟', a: 'تتم معالجة كل صفحة وتحليلها للمحتوى. الصفحات بدون محتوى مرئي تُعتبر فارغة.' },
        { q: 'هل يمكنني المراجعة قبل الحذف؟', a: 'نعم، تُعرض الصفحات الفارغة للمراجعة قبل الحذف.' }
      ] : [
        { q: 'Is deleting blank pages free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'How are blank pages detected?', a: 'Each page is rendered and analyzed for content. Pages with no visible content are flagged as blank.' },
        { q: 'Can I review before deleting?', a: 'Yes, detected blank pages are listed for your review before deletion.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['removePages', 'compress', 'split', 'merge'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      let pdfFile = null, pageCount = 0, resultBlob = null;
      let blankPages = [];
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const scanOptions = document.getElementById('scan-options');
      const scanBtn = document.getElementById('scan-btn');
      const progressArea = document.getElementById('progress-area');
      const blankResults = document.getElementById('blank-results');
      const deleteBtn = document.getElementById('delete-btn');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        blankPages = []; resultBlob = null;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden'); fileInfo.classList.remove('hidden');
        scanOptions.classList.remove('hidden'); blankResults.classList.add('hidden'); result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; resultBlob = null; blankPages = [];
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden'); scanOptions.classList.add('hidden');
        dropZone.classList.remove('hidden'); blankResults.classList.add('hidden'); result.classList.add('hidden');
        progressArea.innerHTML = '';
      });

      scanBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        scanBtn.disabled = true; blankResults.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);

        try {
          const pdfjs = await PDFTools.ensurePDFJS();
          const buf = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: buf }).promise;
          blankPages = [];

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 0.3 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let hasContent = false;
            for (let j = 0; j < imgData.data.length; j += 4) {
              const r = imgData.data[j], g = imgData.data[j+1], b = imgData.data[j+2];
              if (r < 250 || g < 250 || b < 250) { hasContent = true; break; }
            }
            if (!hasContent) blankPages.push(i);
            PDFTools.showProgress(progressArea, 5 + Math.round((i / pdf.numPages) * 90));
          }

          PDFTools.showProgress(progressArea, 100);
          if (blankPages.length === 0) {
            document.getElementById('blank-summary').textContent = T.noBlank;
            deleteBtn.classList.add('hidden');
          } else {
            document.getElementById('blank-summary').textContent = blankPages.length + ' ' + T.blankFound;
            document.getElementById('blank-list').innerHTML = blankPages.map(p =>
              `<div class="flex items-center gap-2 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-lg p-2 text-sm"><span class="text-amber-600">⚠️</span> ${(lang === 'ar' ? 'صفحة ' : 'Page ')} ${p}</div>`
            ).join('');
            deleteBtn.classList.remove('hidden');
          }
          blankResults.classList.remove('hidden');
        } catch (err) {
          console.error(err); PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally { scanBtn.disabled = false; }
      });

      deleteBtn.addEventListener('click', async () => {
        if (blankPages.length === 0) return;
        deleteBtn.disabled = true; result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);
        try {
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const bytes = await pdfFile.arrayBuffer();
          const srcDoc = await PDFDocument.load(bytes, { ignoreEncryption: true });
          const newDoc = await PDFDocument.create();
          const blankSet = new Set(blankPages.map(p => p - 1));
          const keepIndices = [];
          for (let i = 0; i < srcDoc.getPageCount(); i++) { if (!blankSet.has(i)) keepIndices.push(i); }
          const pages = await newDoc.copyPages(srcDoc, keepIndices);
          pages.forEach(p => newDoc.addPage(p));
          PDFTools.showProgress(progressArea, 90);
          const out = await newDoc.save();
          resultBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          document.getElementById('result-text').textContent = T.deleted + ' • ' + keepIndices.length + ' ' + T.keptPages;
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err); PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally { deleteBtn.disabled = false; }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_cleaned.pdf');
      });
    });
  </script>
