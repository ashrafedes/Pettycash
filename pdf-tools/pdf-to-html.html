  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'PDF إلى HTML', desc: 'تحويل PDF إلى HTML. استخراج النص والبنية كملف HTML نظيف.',
        convertBtn: 'تحويل إلى HTML', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً'
      } : {
        title: 'PDF to HTML', desc: 'Convert PDF to HTML. Extract text and structure as a clean HTML file.',
        convertBtn: 'Convert to HTML', pageCount: 'pages', noFile: 'Select a PDF file first'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('convert-btn-label').textContent = T.convertBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل التحويل مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يحافظ على التنسيق؟', a: 'يستخرج المحتوى النصي مع بنية أساسية. التخطيطات المعقدة قد لا تُحافظ تماماً.' },
        { q: 'ما المخرجات؟', a: 'ملف .html نظيف يحتوي على المحتوى النصي من جميع الصفحات.' }
      ] : [
        { q: 'Is PDF to HTML free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Does it preserve formatting?', a: 'It extracts text content with basic structure. Complex layouts may not be perfectly preserved.' },
        { q: 'What output do I get?', a: 'A clean .html file with the text content from all pages.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pdfToText', 'pdfToJpg', 'htmlToPdf', 'merge'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      let pdfFile = null, pageCount = 0, resultBlob = null;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const convertOptions = document.getElementById('convert-options');
      const convertBtn = document.getElementById('convert-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const pdfjs = await PDFTools.ensurePDFJS();
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buf }).promise;
        pageCount = pdf.numPages;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        convertOptions.classList.remove('hidden');
        result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile = null; resultBlob = null;
        fileInfo.classList.add('hidden');
        convertOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
      });

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function buildPageHTML(content, pageNum) {
        const rawItems = Array.isArray(content.items) ? content.items : [];
        const nonEmpty = rawItems.filter(it => {
          const t = String(it.str !== undefined ? it.str : (it.text !== undefined ? it.text : '')).trim();
          return t.length > 0;
        });
        if (!nonEmpty.length) {
          return '<div class="page"><div class="page-num">' + (lang === 'ar' ? 'صفحة ' : 'Page ') + pageNum + '</div><p class="text-sm text-slate-500" data-pt="common.noText">No extractable text on this page. The PDF may contain scanned images.</p></div>';
        }

        const items = nonEmpty.map(it => {
          const str = String(it.str !== undefined ? it.str : (it.text !== undefined ? it.text : ''));
          const transform = Array.isArray(it.transform) ? it.transform : [1, 0, 0, 1, 0, 0];
          const fontSize = it.height || (Math.abs(transform[0]) + Math.abs(transform[3])) / 2 || 12;
          return {
            str,
            x: transform[4] || 0,
            y: transform[5] || 0,
            width: it.width || (str.length * fontSize * 0.5) || 0,
            height: fontSize,
            hasEOL: !!it.hasEOL
          };
        });

        // Sort top-to-bottom, left-to-right. PDF y increases upward.
        items.sort((a, b) => {
          if (Math.abs(a.y - b.y) > 3) return b.y - a.y;
          return a.x - b.x;
        });

        // Group items into lines by y
        const lines = [];
        let line = [];
        let lastY = null;
        const yThreshold = 3;
        for (const it of items) {
          if (lastY !== null && Math.abs(it.y - lastY) > yThreshold) {
            if (line.length) lines.push(line);
            line = [];
          }
          line.push(it);
          lastY = it.y;
        }
        if (line.length) lines.push(line);

        // Build line strings, inferring spaces from x gaps
        const lineInfos = [];
        for (const ln of lines) {
          ln.sort((a, b) => a.x - b.x);
          let text = '';
          let lastEnd = null;
          let lastFontSize = 0;
          for (const it of ln) {
            const gap = lastEnd !== null ? (it.x - lastEnd) : 0;
            const spaceWidth = Math.max(lastFontSize * 0.25, it.height * 0.25, 1.5);
            if (gap > spaceWidth) {
              text += ' ';
            } else if (gap > 0.2 && !text.endsWith(' ') && !it.str.startsWith(' ')) {
              text += ' ';
            }
            text += it.str;
            // Compute approximate end x from width or fallback
            lastEnd = it.x + (it.width || it.str.length * it.height * 0.5);
            lastFontSize = it.height;
          }
          lineInfos.push({ text: text.trim(), y: ln[0].y, height: ln[0].height });
        }

        // Group lines into paragraphs
        let html = '<div class="page">';
        html += '<div class="page-num">' + (lang === 'ar' ? 'صفحة ' : 'Page ') + pageNum + '</div>';
        let paraLines = [];
        let prevY = null;
        let prevHeight = 12;

        function flushPara() {
          if (!paraLines.length) return;
          html += '<p>' + paraLines.map(escapeHtml).join('<br>') + '</p>';
          paraLines = [];
        }

        for (const ln of lineInfos) {
          if (prevY !== null) {
            const gap = prevY - ln.y; // PDF y decreasing as we move down
            if (gap > prevHeight * 1.6) {
              flushPara();
            }
          }
          paraLines.push(ln.text);
          prevY = ln.y;
          prevHeight = ln.height || 12;
        }
        flushPara();
        html += '</div>';
        return html;
      }

      convertBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        convertBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          const pdfjs = await PDFTools.ensurePDFJS();
          const buf = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: buf }).promise;
          const css = 'body{font-family:Inter,Arial,sans-serif;max-width:800px;margin:0 auto;padding:20px;line-height:1.6;color:#333}p{margin:0 0 0.8em}.page{margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid #eee}.page-num{font-size:12px;color:#999;margin-bottom:12px}';
          let htmlParts = ['<!DOCTYPE html>', '<html lang="' + (lang === 'ar' ? 'ar' : 'en') + '" dir="' + (lang === 'ar' ? 'rtl' : 'ltr') + '">', '<head>', '<meta charset="UTF-8">', '<meta name="viewport" content="width=device-width, initial-scale=1.0">', '<title>' + escapeHtml(pdfFile.name.replace(/\.pdf$/i, '')) + '</title>', '<style>' + css + '</style>', '</head>', '<body>'];

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            htmlParts.push(buildPageHTML(content, i));
            PDFTools.showProgress(progressArea, 10 + Math.round((i / pdf.numPages) * 80));
          }

          htmlParts.push('</body></html>');
          const html = htmlParts.join('\n');
          resultBlob = new Blob([html], { type: 'text/html' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          convertBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '.html');
      });
    });
  </script>
