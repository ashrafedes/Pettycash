  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();

      const faqs = lang === 'ar' ? [
        { q: 'هل تدوير PDF مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يمكنني تدوير صفحات محددة فقط؟', a: 'نعم، يمكنك تدوير جميع الصفحات أو صفحات محددة.' }
      ] : [
        { q: 'Is rotating PDF free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Can I rotate specific pages only?', a: 'Yes, you can rotate all pages or specific page ranges.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `
        <details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
          <summary class="font-semibold cursor-pointer text-sm">${f.q}</summary>
          <p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p>
        </details>`).join('');

      const related = ['merge', 'split', 'removePages', 'reorder'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Rotate Logic =====================
      let pdfFile = null;
      let pageCount = 0;
      let resultBlob = null;
      let rotationMap = {}; // { pageIndex: cumulativeAngle }
      let selectedFromPreview = new Set();
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const rotateOptions = document.getElementById('rotate-options');
      const rotateBtn = document.getElementById('rotate-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');
      const previewArea = document.getElementById('preview-area');
      const previewHint = document.getElementById('preview-hint');

      async function renderPreview(selectable = false) {
        previewArea.classList.remove('hidden');
        previewArea.innerHTML = '<p class="text-sm text-slate-500 text-center mb-3">Loading preview...</p>';
        const source = resultBlob || pdfFile;
        if (!source) return;
        await PDFTools.renderPDFPreview(previewArea, source, {
          maxPages: 20, scale: 0.4, selectable,
          rotationMap,
          onSelectionChange: (pages) => { selectedFromPreview = new Set(pages); }
        });
      }

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument, degrees } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        rotationMap = {};
        resultBlob = null;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + (lang === 'ar' ? 'صفحة' : 'pages');
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        rotateOptions.classList.remove('hidden');
        await renderPreview(false);
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; resultBlob = null; rotationMap = {};
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden');
        rotateOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
        previewArea.innerHTML = '';
        previewArea.classList.add('hidden');
        previewHint.classList.add('hidden');
      });

      function updateRotateHint() {
        const angle = document.querySelector('input[name="angle"]:checked')?.value || '90';
        const pagesMode = document.querySelector('input[name="pages-mode"]:checked')?.value;
        if (pagesMode === 'preview') {
          const selectedCount = selectedFromPreview.size;
          previewHint.textContent = lang === 'ar'
            ? 'الزاوية المحددة: ' + angle + '° — انقر على الصفحات لتحديدها للتدوير' + (selectedCount ? ' (' + selectedCount + ' صفحة محددة)' : '')
            : 'Selected angle: ' + angle + '° — Click pages to select them for rotation' + (selectedCount ? ' (' + selectedCount + ' pages selected)' : '');
        }
      }

      // Toggle green highlight on angle cards
      function updateAngleCards() {
        document.querySelectorAll('#angle-cards .angle-card').forEach(card => {
          const radio = card.parentElement.querySelector('input[type="radio"]');
          if (radio.checked) {
            card.style.borderColor = '#16a34a';
            card.style.backgroundColor = 'rgba(22,163,74,0.08)';
            card.style.color = '#16a34a';
          } else {
            card.style.borderColor = '';
            card.style.backgroundColor = '';
            card.style.color = '';
          }
        });
      }
      document.querySelectorAll('input[name="angle"]').forEach(r => {
        r.addEventListener('change', () => { updateAngleCards(); updateRotateHint(); });
      });
      updateAngleCards();

      document.querySelectorAll('input[name="pages-mode"]').forEach(r => {
        r.addEventListener('change', () => {
          const isCustom = r.value === 'custom' && r.checked;
          const isPreview = r.value === 'preview' && r.checked;
          document.getElementById('pages-custom').classList.toggle('hidden', !isCustom);
          previewHint.classList.toggle('hidden', !isPreview);
          if (isPreview) {
            selectedFromPreview.clear();
            renderPreview(true);
            updateRotateHint();
          } else if (r.checked) {
            renderPreview(false);
          }
        });
      });

      function parseRanges(str, max) {
        const parts = str.split(',').map(s => s.trim()).filter(Boolean);
        const set = new Set();
        for (const p of parts) {
          if (p.includes('-')) {
            const [a, b] = p.split('-').map(n => parseInt(n.trim()));
            if (isNaN(a) || isNaN(b) || a < 1 || b > max || a > b) throw new Error('Invalid range: ' + p);
            for (let i = a; i <= b; i++) set.add(i - 1);
          } else {
            const n = parseInt(p);
            if (isNaN(n) || n < 1 || n > max) throw new Error('Invalid page: ' + p);
            set.add(n - 1);
          }
        }
        return set;
      }

      rotateBtn.addEventListener('click', async () => {
        if (!pdfFile) return;
        rotateBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          const angle = parseInt(document.querySelector('input[name="angle"]:checked').value);
          const pagesMode = document.querySelector('input[name="pages-mode"]:checked').value;
          let targetPages = new Set();
          if (pagesMode === 'all') {
            for (let i = 0; i < pageCount; i++) targetPages.add(i);
          } else if (pagesMode === 'custom') {
            targetPages = parseRanges(document.getElementById('page-ranges').value, pageCount);
          } else if (pagesMode === 'preview') {
            targetPages = selectedFromPreview;
            if (!targetPages.size) { PDFTools.toast(lang === 'ar' ? 'اختر صفحات من المعاينة' : 'Select pages from preview'); rotateBtn.disabled = false; return; }
          }

          // Update rotationMap cumulatively — rotate from current preview state
          targetPages.forEach(idx => {
            const current = rotationMap[idx] || 0;
            rotationMap[idx] = (current + angle) % 360;
          });

          // Build the rotated PDF from the ORIGINAL file, applying cumulative rotations
          const { PDFDocument, degrees } = await PDFTools.ensurePDFLib();
          const bytes = await pdfFile.arrayBuffer();
          const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
          const pages = doc.getPages();
          pages.forEach((page, i) => {
            const rot = rotationMap[i] || 0;
            if (rot) page.setRotation(degrees(rot));
          });

          PDFTools.showProgress(progressArea, 80);
          const out = await doc.save();
          resultBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          // Re-render preview from the new result, with rotationMap for badges
          const wasSelectable = pagesMode === 'preview';
          await renderPreview(wasSelectable);
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          rotateBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) {
          const name = pdfFile.name.replace(/\.pdf$/i, '') + '_rotated.pdf';
          PDFTools.downloadBlob(resultBlob, name);
        }
      });
    });
  </script>
