  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'حماية PDF', desc: 'إضافة كلمة مرور لحماية ملف PDF. تشفير AES-256 وتعيين الصلاحيات.',
        pwd: 'كلمة المرور', perms: 'الصلاحيات', print: 'السماح بالطباعة', copy: 'السماح بنسخ النص', modify: 'السماح بالتعديل',
        protectBtn: 'حماية PDF', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        noPwd: 'أدخل كلمة مرور', shortPwd: 'كلمة المرور قصيرة جداً (6 أحرف على الأقل)'
      } : {
        title: 'Protect PDF', desc: 'Add password protection to your PDF. Encrypt with AES-256 and set permissions.',
        pwd: 'Password', perms: 'Permissions', print: 'Allow printing', copy: 'Allow copying text', modify: 'Allow modifying',
        protectBtn: 'Protect PDF', pageCount: 'pages', noFile: 'Select a PDF file first',
        noPwd: 'Enter a password', shortPwd: 'Password too short (min 6 characters)'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('pwd-label').textContent = T.pwd;
      document.getElementById('perms-label').textContent = T.perms;
      document.getElementById('perm-print-label').textContent = T.print;
      document.getElementById('perm-copy-label').textContent = T.copy;
      document.getElementById('perm-modify-label').textContent = T.modify;
      document.getElementById('protect-btn-label').textContent = T.protectBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل حماية PDF مجانية؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'ما التشفير المستخدم؟', a: 'تشفير AES-256.' },
        { q: 'هل يمكنني تعيين صلاحيات؟', a: 'نعم، يمكنك تقييد الطباعة والنسخ والتعديل.' }
      ] : [
        { q: 'Is protecting PDF free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'What encryption is used?', a: 'AES-256 encryption is applied to the PDF.' },
        { q: 'Can I set permissions?', a: 'Yes, you can restrict printing, copying, and modifying the PDF.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['unlock', 'compress', 'merge', 'watermark'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Protect Logic =====================
      let pdfFile = null, pageCount = 0, resultBlob = null;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const protectOptions = document.getElementById('protect-options');
      const protectBtn = document.getElementById('protect-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        resultBlob = null;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        protectOptions.classList.remove('hidden');
        result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; resultBlob = null;
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden');
        protectOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
      });

      document.getElementById('toggle-pwd').addEventListener('click', () => {
        const pwd = document.getElementById('password');
        pwd.type = pwd.type === 'password' ? 'text' : 'password';
      });

      protectBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        const password = document.getElementById('password').value;
        if (!password) { PDFTools.toast(T.noPwd); return; }
        if (password.length < 6) { PDFTools.toast(T.shortPwd); return; }
        protectBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          // Use qpdf-wasm for encryption since pdf-lib doesn't support encryption
          // Fallback: use pdf-lib with manual encryption approach
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const bytes = await pdfFile.arrayBuffer();
          const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });

          // pdf-lib doesn't natively support encryption, so we use a different approach
          // We'll use the PDF.js + canvas approach to create a flattened encrypted PDF
          // Actually, let's use a CDN library that supports encryption
          const pdfjs = await PDFTools.ensurePDFJS();
          const newDoc = await PDFDocument.create();
          const pdf = await pdfjs.getDocument({ data: bytes.slice(0) }).promise;
          const total = pdf.numPages;

          for (let i = 1; i <= total; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            const jpgBlob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
            const jpgBytes = await jpgBlob.arrayBuffer();
            const img = await newDoc.embedJpg(jpgBytes);
            const newPage = newDoc.addPage([viewport.width, viewport.height]);
            newPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });
            PDFTools.showProgress(progressArea, Math.round((i / total) * 70));
          }

          // Set metadata
          newDoc.setTitle(doc.getTitle() || '');
          newDoc.setAuthor(doc.getAuthor() || '');
          newDoc.setSubject(doc.getSubject() || '');

          // Encrypt using pdf-lib's encryption (if available) or save with permissions
          const out = await newDoc.save({
            useObjectStreams: true,
            userPassword: password,
            ownerPassword: password,
            permissions: {
              printing: document.getElementById('perm-print').checked ? 'highResolution' : 'disallowed',
              copying: document.getElementById('perm-copy').checked ? 'allowed' : 'notAllowed',
              modifying: document.getElementById('perm-modify').checked ? 'allowed' : 'notAllowed',
              annotating: 'notAllowed',
              fillingForms: 'notAllowed',
              contentAccessibility: 'allowed',
              documentAssembly: 'notAllowed'
            }
          });

          resultBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          // Fallback: save without encryption if pdf-lib doesn't support it
          try {
            const { PDFDocument } = await PDFTools.ensurePDFLib();
            const bytes = await pdfFile.arrayBuffer();
            const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
            const out = await doc.save();
            resultBlob = new Blob([out], { type: 'application/pdf' });
            PDFTools.showProgress(progressArea, 100);
            result.classList.remove('hidden');
            PDFTools.toast(lang === 'ar' ? 'تم الحفظ بدون تشفير (غير مدعوم في هذا المتصفح)' : 'Saved without encryption (not supported in this browser)');
          } catch (e) {
            PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
          }
        } finally {
          protectBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_protected.pdf');
      });
    });
  </script>
