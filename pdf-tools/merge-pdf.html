  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();

      // FAQ data
      const faqs = lang === 'ar' ? [
        { q: 'هل دمج ملفات PDF مجاني؟', a: 'نعم، مجاني تماماً بدون حدود أو تسجيل.' },
        { q: 'هل يتم رفع ملفاتي إلى الخادم؟', a: 'لا. كل المعالجة تتم في متصفحك. ملفاتك لا تغادر جهازك.' },
        { q: 'كم ملف PDF يمكنني دمجه؟', a: 'يمكنك دمج أي عدد من ملفات PDF. لا يوجد حد.' },
        { q: 'هل يمكنني إعادة ترتيب الملفات قبل الدمج؟', a: 'نعم، يمكنك سحب وإفلات الملفات لإعادة ترتيبها.' }
      ] : [
        { q: 'Is merging PDF files free?', a: 'Yes, completely free with no limits or signup required.' },
        { q: 'Are my files uploaded to a server?', a: 'No. All processing happens in your browser. Your files never leave your device.' },
        { q: 'How many PDFs can I merge?', a: 'You can merge as many PDF files as you want. There is no limit.' },
        { q: 'Can I reorder the files before merging?', a: 'Yes, you can drag and drop files to reorder them before merging.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map((f, i) => `
        <details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
          <summary class="font-semibold cursor-pointer text-sm">${f.q}</summary>
          <p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p>
        </details>
      `).join('');

      // Related tools
      const related = ['split', 'rotate', 'compress', 'extractPages'];
      const relatedEl = document.getElementById('related-tools');
      relatedEl.innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Merge Logic =====================
      let files = [];
      let mergedBlob = null;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileList = document.getElementById('file-list');
      const actions = document.getElementById('actions');
      const addMore = document.getElementById('add-more');
      const mergeBtn = document.getElementById('merge-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');

      const previewArea = document.getElementById('preview-area');

      PDFTools.initDropZone(dropZone, fileInput, handleFiles, { accept: '.pdf', multiple: true });

      async function handleFiles(newFiles) {
        newFiles.forEach(f => files.push(f));
        renderFileList();
        await updatePreview();
      }

      async function updatePreview() {
        if (!files.length) { previewArea.classList.add('hidden'); return; }
        previewArea.classList.remove('hidden');
        previewArea.innerHTML = '<p class="text-sm text-slate-500 text-center mb-3">Loading preview...</p>';
        try {
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const merged = await PDFDocument.create();
          for (const f of files) {
            const bytes = await f.arrayBuffer();
            const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
            const pages = await merged.copyPages(doc, doc.getPageIndices());
            pages.forEach(p => merged.addPage(p));
          }
          const out = await merged.save();
          const blob = new Blob([out], { type: 'application/pdf' });
          await PDFTools.renderPDFPreview(previewArea, blob, { maxPages: 12, scale: 0.35 });
        } catch (e) {
          previewArea.innerHTML = '<p class="text-sm text-slate-400 text-center">Preview unavailable</p>';
        }
      }

      function renderFileList() {
        if (!files.length) {
          fileList.classList.add('hidden');
          actions.classList.add('hidden');
          return;
        }
        fileList.classList.remove('hidden');
        actions.classList.remove('hidden');
        actions.classList.add('flex');

        fileList.innerHTML = files.map((f, i) => `
          <div class="file-item animate-fade-up" draggable="true" data-index="${i}">
            <div class="file-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
            </div>
            <div class="file-info">
              <div class="file-name">${PDFTools.formatBytes(f.size)} — ${f.name}</div>
              <div class="file-meta">#${i + 1}</div>
            </div>
            <button class="text-red-500 hover:text-red-700 p-1" data-remove="${i}" aria-label="Remove">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
        `).join('');

        // Remove buttons
        fileList.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', () => {
            files.splice(parseInt(btn.dataset.remove), 1);
            renderFileList();
            updatePreview();
          });
        });

        // Drag reorder
        let dragIndex = null;
        fileList.querySelectorAll('.file-item').forEach(item => {
          item.addEventListener('dragstart', (e) => { dragIndex = parseInt(item.dataset.index); });
          item.addEventListener('dragover', (e) => { e.preventDefault(); });
          item.addEventListener('drop', (e) => {
            e.preventDefault();
            const dropIndex = parseInt(item.dataset.index);
            if (dragIndex !== null && dragIndex !== dropIndex) {
              const moved = files.splice(dragIndex, 1)[0];
              files.splice(dropIndex, 0, moved);
              renderFileList();
              updatePreview();
            }
          });
        });
      }

      addMore.addEventListener('click', () => fileInput.click());

      mergeBtn.addEventListener('click', async () => {
        if (files.length < 2) {
          PDFTools.toast(lang === 'ar' ? 'أضف ملفين على الأقل' : 'Add at least 2 files');
          return;
        }
        mergeBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);

        try {
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const merged = await PDFDocument.create();
          const total = files.length;

          for (let i = 0; i < total; i++) {
            const bytes = await files[i].arrayBuffer();
            const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
            const pages = await merged.copyPages(doc, doc.getPageIndices());
            pages.forEach(p => merged.addPage(p));
            PDFTools.showProgress(progressArea, Math.round(((i + 1) / total) * 90));
          }

          const out = await merged.save();
          mergedBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          await PDFTools.renderPDFPreview(previewArea, mergedBlob, { maxPages: 12, scale: 0.35 });
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          mergeBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (mergedBlob) PDFTools.downloadBlob(mergedBlob, 'merged.pdf');
      });
    });
  </script>
