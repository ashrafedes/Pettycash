  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'PDF إلى JPG', desc: 'تحويل صفحات PDF إلى صور JPG أو PNG. اختر الصفحات من المعاينة أو حوّل الكل.',
        format: 'الصيغة', quality: 'الجودة', high: 'عالية (2x)', medium: 'متوسطة (1.5x)', low: 'قياسية (1x)',
        pagesMode: 'الصفحات', all: 'الكل', select: 'اختيار من المعاينة',
        convertBtn: 'تحويل', pageCount: 'صفحة', noSelection: 'لم يتم اختيار صفحات',
        hintPreview: 'انقر على الصفحات لتحديدها للتحويل',
        noFile: 'اختر ملف PDF أولاً', downloadAll: 'تحميل الكل (ZIP)', download: 'تحميل',
        converting: 'جاري التحويل...', page: 'صفحة'
      } : {
        title: 'PDF to JPG', desc: 'Convert PDF pages to JPG or PNG images. Select pages from preview or convert all.',
        format: 'Format', quality: 'Quality', high: 'High (2x)', medium: 'Medium (1.5x)', low: 'Standard (1x)',
        pagesMode: 'Pages', all: 'All', select: 'Select from preview',
        convertBtn: 'Convert', pageCount: 'pages', noSelection: 'No pages selected',
        hintPreview: 'Click pages to select them for conversion',
        noFile: 'Select a PDF file first', downloadAll: 'Download All (ZIP)', download: 'Download',
        converting: 'Converting...', page: 'Page'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('format-label').textContent = T.format;
      document.getElementById('quality-label').textContent = T.quality;
      document.getElementById('opt-high').textContent = T.high;
      document.getElementById('opt-medium').textContent = T.medium;
      document.getElementById('opt-low').textContent = T.low;
      document.getElementById('pages-mode-label').textContent = T.pagesMode;
      document.getElementById('lbl-all').textContent = T.all;
      document.getElementById('lbl-select').textContent = T.select;
      document.getElementById('convert-btn-label').textContent = T.convertBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل تحويل PDF إلى JPG مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يمكنني اختيار صفحات محددة؟', a: 'نعم، انقر على الصفحات من المعاينة لتحديدها.' },
        { q: 'ما الصيغ المدعومة؟', a: 'JPG و PNG.' }
      ] : [
        { q: 'Is converting PDF to JPG free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Can I select specific pages?', a: 'Yes, click on page thumbnails to select them.' },
        { q: 'What formats are supported?', a: 'JPG and PNG.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['imageToPdf', 'split', 'extractPages', 'compress'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== PDF to JPG Logic =====================
      let pdfFile = null, pageCount = 0;
      let selectedFromPreview = new Set();
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const convertOptions = document.getElementById('convert-options');
      const convertBtn = document.getElementById('convert-btn');
      const progressArea = document.getElementById('progress-area');
      const results = document.getElementById('results');
      const previewArea = document.getElementById('preview-area');
      const previewHint = document.getElementById('preview-hint');

      async function renderPreview(selectable) {
        previewArea.classList.remove('hidden');
        previewArea.innerHTML = '<p class="text-sm text-slate-500 text-center mb-3">Loading preview...</p>';
        await PDFTools.renderPDFPreview(previewArea, pdfFile, {
          maxPages: 20, scale: 0.4, selectable,
          onSelectionChange: (pages) => { selectedFromPreview = new Set(pages); }
        });
      }

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        selectedFromPreview.clear();
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        convertOptions.classList.remove('hidden');
        await renderPreview(false);
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; selectedFromPreview.clear();
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden');
        convertOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        results.classList.add('hidden');
        previewArea.classList.add('hidden');
        previewArea.innerHTML = '';
        previewHint.classList.add('hidden');
        document.getElementById('progress-area').innerHTML = '';
      });

      document.querySelectorAll('input[name="pages-mode"]').forEach(r => {
        r.addEventListener('change', async () => {
          if (r.value === 'preview' && r.checked) {
            selectedFromPreview.clear();
            previewHint.classList.remove('hidden');
            previewHint.textContent = T.hintPreview;
            await renderPreview(true);
            previewArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          } else if (r.checked) {
            await renderPreview(false);
            previewHint.classList.add('hidden');
          }
        });
      });

      convertBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        const format = document.getElementById('img-format').value;
        const qualityScale = parseFloat(document.getElementById('img-quality').value);
        const pagesMode = document.querySelector('input[name="pages-mode"]:checked').value;
        let targetPages = [];
        if (pagesMode === 'preview') {
          targetPages = Array.from(selectedFromPreview).sort((a, b) => a - b);
          if (!targetPages.length) { PDFTools.toast(T.noSelection); return; }
        } else {
          for (let i = 0; i < pageCount; i++) targetPages.push(i);
        }

        convertBtn.disabled = true;
        results.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);

        try {
          const pdfjs = await PDFTools.ensurePDFJS();
          const arrayBuffer = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
          const blobs = [];
          const total = targetPages.length;

          for (let idx = 0; idx < total; idx++) {
            const pageNum = targetPages[idx] + 1;
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: qualityScale * 2 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;

            const mime = format === 'png' ? 'image/png' : 'image/jpeg';
            const blob = await new Promise(res => canvas.toBlob(res, mime, 0.92));
            blobs.push({ blob, name: pdfFile.name.replace(/\.pdf$/i, '') + '_page_' + pageNum + '.' + format });
            PDFTools.showProgress(progressArea, Math.round(((idx + 1) / total) * 90));
          }

          PDFTools.showProgress(progressArea, 100);
          results.classList.remove('hidden');

          if (blobs.length === 1) {
            results.innerHTML = `<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 flex items-center justify-between">
              <span class="text-sm font-semibold">${blobs[0].name}</span>
              <button class="btn-pdf btn-pdf-primary text-xs" data-download="0">${T.download}</button>
            </div>`;
            results.querySelector('[data-download="0"]').addEventListener('click', () => PDFTools.downloadBlob(blobs[0].blob, blobs[0].name));
          } else {
            const JSZip = await PDFTools.ensureJSZip();
            const zip = new JSZip();
            blobs.forEach(b => zip.file(b.name, b.blob));
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            results.innerHTML = `<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 flex items-center justify-between">
              <span class="text-sm font-semibold">${blobs.length} ${T.page} — ZIP</span>
              <button class="btn-pdf btn-pdf-primary text-xs" id="download-zip">${T.downloadAll}</button>
            </div>`;
            document.getElementById('download-zip').addEventListener('click', () => PDFTools.downloadBlob(zipBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_images.zip'));
          }
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          convertBtn.disabled = false;
        }
      });
    });
  </script>
