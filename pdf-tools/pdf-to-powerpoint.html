  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is PDF to PowerPoint free?","a":"Yes, completely free."},{"q":"Are my files uploaded?","a":"No. All processing happens in your browser."},{"q":"Is the output editable?","a":"The output PPTX contains slide images of each PDF page."},{"q":"One slide per page?","a":"Yes, each PDF page becomes a separate slide."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["pdfToWord","pdfToJpg","pdfToExcel","merge"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let pdfFile=null, resultBlob=null;
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        pdfFile=f[0]; resultBlob=null;
        const pdfjs=await PDFTools.ensurePDFJS();
        const buf=await pdfFile.arrayBuffer();
        const pdf=await pdfjs.getDocument({data:buf}).promise;
        document.getElementById('file-name-display').textContent=pdfFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(pdfFile.size)+' • '+pdf.numPages+' pages';
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('convert-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }, {accept:'.pdf', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile=null; resultBlob=null;
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('convert-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      });
      document.getElementById('convert-btn').addEventListener('click', async () => {
        if(!pdfFile){PDFTools.toast('Select a PDF file first');return;}
        const btn=document.getElementById('convert-btn'); btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),10);
        try {
          const JSZip=await PDFTools.ensureJSZip();
          const pdfjs=await PDFTools.ensurePDFJS();
          const buf=await pdfFile.arrayBuffer();
          const pdf=await pdfjs.getDocument({data:buf}).promise;
          const zip=new JSZip();
          // Minimal PPTX structure
          zip.file('[Content_Types].xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Default Extension="jpeg" ContentType="image/jpeg"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/><Override PartName="/ppt/slideMasters/slideMaster1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"/><Override PartName="/ppt/slides/slide1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/></Types>');
          zip.file('_rels/.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>');
          zip.file('ppt/_rels/presentation.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>');
          let slideRels='';
          let presSlides='';
          for(let i=1;i<=pdf.numPages;i++){
            const page=await pdf.getPage(i);
            const viewport=page.getViewport({scale:1.5});
            const canvas=document.createElement('canvas');
            canvas.width=viewport.width; canvas.height=viewport.height;
            const ctx=canvas.getContext('2d');
            await page.render({canvasContext:ctx,viewport}).promise;
            const jpg=await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.9));
            const jpgBytes=await jpg.arrayBuffer();
            zip.file('ppt/media/slide'+i+'.jpg',jpgBytes);
            // Slide XML
            zip.file('ppt/slides/slide'+i+'.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:cSld><p:spTree><p:pic><p:nvPicPr><p:cNvPr id="1" name="Image 1"/><p:cNvPicPr/><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="rId1"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+Math.round(viewport.width*9525)+'" cy="'+Math.round(viewport.height*9525)+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic></p:spTree></p:cSld></p:sld>');
            zip.file('ppt/slides/_rels/slide'+i+'.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/slide'+i+'.jpg"/></Relationships>');
            slideRels+='<Relationship Id="rId'+i+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide'+i+'.xml"/>';
            presSlides+='<p:sldId id="'+(i+255)+'" r:id="rId'+i+'"/><p:sldIdLst>';
            PDFTools.showProgress(document.getElementById('progress-area'),10+Math.round((i/pdf.numPages)*80));
          }
          zip.file('ppt/_rels/presentation.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+slideRels+'</Relationships>');
          zip.file('ppt/presentation.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:sldIdLst>'+presSlides.replace(/<p:sldIdLst>/g,'')+'</p:sldIdLst><p:sldSz cx="9144000" cy="6858000"/><p:notesSz cx="6858000" cy="9144000"/></p:presentation>');
          const out=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
          resultBlob=out;
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+err.message);} finally{btn.disabled=false;}
      });
      document.getElementById('download-btn').addEventListener('click',()=>{if(resultBlob)PDFTools.downloadBlob(resultBlob,pdfFile.name.replace(/\.pdf$/i,'')+'.pptx');});
    });
  </script>
