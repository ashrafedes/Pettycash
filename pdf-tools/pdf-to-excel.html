  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is PDF to Excel free?","a":"Yes, completely free."},{"q":"Are my files uploaded?","a":"No. All processing happens in your browser."},{"q":"Does it extract tables?","a":"Yes, tables in the PDF are detected and converted to spreadsheet cells."},{"q":"Will all data be accurate?","a":"Accuracy depends on the PDF structure. Clearly formatted tables work best."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["pdfToWord","extractTables","pdfToText","pdfToWord"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let pdfFile=null, resultBlob=null;
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        pdfFile=f[0]; resultBlob=null;
        const pdfjs=await PDFTools.ensurePDFJS();
        const buf=await pdfFile.arrayBuffer();
        const pdf=await pdfjs.getDocument({data:buf}).promise;
        document.getElementById('file-name-display').textContent=pdfFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(pdfFile.size)+' • '+pdf.numPages+' pages';
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('convert-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }, {accept:'.pdf', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile=null; resultBlob=null;
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('convert-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      });
      document.getElementById('convert-btn').addEventListener('click', async () => {
        if(!pdfFile){PDFTools.toast('Select a PDF file first');return;}
        const btn=document.getElementById('convert-btn'); btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),10);
        try {
          if(!window.XLSX) await PDFTools.loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
          const pdfjs=await PDFTools.ensurePDFJS();
          const buf=await pdfFile.arrayBuffer();
          const pdf=await pdfjs.getDocument({data:buf}).promise;
          const wb=XLSX.utils.book_new();
          for(let i=1;i<=pdf.numPages;i++){
            const page=await pdf.getPage(i);
            const content=await page.getTextContent();
            const viewport=page.getViewport({scale:1});
            // Group by Y position (rows)
            const rows={};
            content.items.forEach(item=>{
              const y=Math.round(item.transform[5]/3)*3;
              if(!rows[y]) rows[y]=[];
              rows[y].push({text:item.str,x:item.transform[4]});
            });
            const sortedYs=Object.keys(rows).map(Number).sort((a,b)=>b-a);
            // Detect columns
            const allX=[];
            sortedYs.forEach(y=>rows[y].forEach(item=>allX.push(item.x)));
            allX.sort((a,b)=>a-b);
            const columns=[]; let colStart=allX[0]||0;
            for(let j=1;j<allX.length;j++){
              if(allX[j]-allX[j-1]>20){columns.push((colStart+allX[j-1])/2);colStart=allX[j];}
            }
            columns.push(viewport.width);
            // Build AOA
            const aoa=[];
            sortedYs.forEach(y=>{
              const items=rows[y].sort((a,b)=>a.x-b.x);
              const cells=new Array(columns.length).fill('');
              items.forEach(item=>{
                let ci=0;
                for(let c=0;c<columns.length-1;c++){if(item.x>=columns[c])ci=c;}
                cells[ci]=(cells[ci]+' '+item.text).trim();
              });
              if(cells.filter(c=>c.trim()).length>=2) aoa.push(cells);
            });
            if(aoa.length>0){
              const ws=XLSX.utils.aoa_to_sheet(aoa);
              XLSX.utils.book_append_sheet(wb,ws,'Page'+i);
            }
            PDFTools.showProgress(document.getElementById('progress-area'),10+Math.round((i/pdf.numPages)*80));
          }
          if(wb.SheetNames.length===0){const ws=XLSX.utils.aoa_to_sheet([['No tables found']]);XLSX.utils.book_append_sheet(wb,ws,'Sheet1');}
          const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
          resultBlob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+err.message);} finally{btn.disabled=false;}
      });
      document.getElementById('download-btn').addEventListener('click',()=>{if(resultBlob)PDFTools.downloadBlob(resultBlob,pdfFile.name.replace(/\.pdf$/i,'')+'.xlsx');});
    });
  </script>
