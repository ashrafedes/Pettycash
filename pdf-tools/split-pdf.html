  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();

      // Add split translations dynamically
      const splitT = lang === 'ar' ? {
        title: 'تقسيم PDF', desc: 'تقسيم ملف PDF إلى عدة ملفات حسب نطاقات الصفحات. كل نطاق يصبح ملفاً منفصلاً.',
        mode: 'وضع التقسيم', byRange: 'حسب نطاقات الصفحات', eachPage: 'كل صفحة كملف', everyN: 'كل N صفحات',
        fromPreview: 'اختيار من المعاينة',
        rangesLabel: 'نطاقات الصفحات (مثال: 1-3, 5, 8-10)', everyLabel: 'صفحات لكل ملف',
        splitBtn: 'تقسيم PDF', pageCount: 'صفحة', downloadAll: 'تحميل الكل (ZIP)',
        invalidRange: 'نطاق غير صالح', noFile: 'اختر ملف PDF أولاً',
        newGroup: 'مجموعة جديدة', selectedPages: 'الصفحات المحددة', noSelection: 'لم يتم اختيار صفحات بعد',
        groups: 'مجموعات التقسيم', group: 'مجموعة', pages: 'صفحات'
      } : {
        title: 'Split PDF', desc: 'Split a PDF into multiple files by page ranges. Each range becomes a separate file.',
        mode: 'Split Mode', byRange: 'By page ranges', eachPage: 'Each page as file', everyN: 'Every N pages',
        fromPreview: 'Select from preview',
        rangesLabel: 'Page ranges (e.g. 1-3, 5, 8-10)', everyLabel: 'Pages per file',
        splitBtn: 'Split PDF', pageCount: 'pages', downloadAll: 'Download All (ZIP)',
        invalidRange: 'Invalid range', noFile: 'Select a PDF file first',
        newGroup: 'New group', selectedPages: 'Selected pages', noSelection: 'No pages selected yet',
        groups: 'Split groups', group: 'Group', pages: 'pages'
      };

      // FAQ
      const faqs = lang === 'ar' ? [
        { q: 'هل تقسيم PDF مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'كيف أقسم بنطاقات الصفحات؟', a: 'أدخل نطاقات مثل 1-3, 5, 8-10. كل نطاق يصبح ملف PDF منفصل.' }
      ] : [
        { q: 'Is splitting PDF free?', a: 'Yes, completely free with no limits.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'How do I split by page ranges?', a: 'Enter ranges like 1-3, 5, 8-10. Each range becomes a separate PDF file.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `
        <details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
          <summary class="font-semibold cursor-pointer text-sm">${f.q}</summary>
          <p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p>
        </details>`).join('');

      // Related
      const related = ['merge', 'rotate', 'removePages', 'extractPages'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Split Logic =====================
      let pdfFile = null;
      let pageCount = 0;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const splitOptions = document.getElementById('split-options');
      const splitBtn = document.getElementById('split-btn');
      const progressArea = document.getElementById('progress-area');
      const results = document.getElementById('results');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + splitT.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        splitOptions.classList.remove('hidden');
        // Render preview
        const previewArea = document.getElementById('preview-area');
        previewArea.classList.remove('hidden');
        previewArea.innerHTML = '<p class="text-sm text-slate-500 text-center mb-3">Loading preview...</p>';
        await PDFTools.renderPDFPreview(previewArea, pdfFile, { maxPages: 20, scale: 0.4 });
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null;
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden');
        splitOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        results.classList.add('hidden');
        document.getElementById('preview-area').classList.add('hidden');
        document.getElementById('preview-area').innerHTML = '';
        document.getElementById('progress-area').innerHTML = '';
      });

      // Set labels for preview-select section
      document.getElementById('selected-pages-label').textContent = splitT.selectedPages;
      document.getElementById('new-group-label').textContent = splitT.newGroup;

      // Mode toggle
      let splitGroups = [[]]; // array of arrays of page indices
      let currentGroupIdx = 0;
      const previewHint = document.getElementById('preview-hint');
      const groupsDisplay = document.getElementById('groups-display');
      const newGroupBtn = document.getElementById('new-group-btn');

      function getAssignedPages() {
        const all = new Set();
        splitGroups.forEach((g, gi) => { if (gi !== currentGroupIdx) g.forEach(p => all.add(p)); });
        return all;
      }

      function renderGroups() {
        if (!splitGroups.length) groupsDisplay.innerHTML = '<p class="text-xs text-slate-400">' + splitT.noSelection + '</p>';
        else groupsDisplay.innerHTML = splitGroups.map((g, i) => {
          const pages = g.map(p => p + 1).join(', ');
          const isActive = i === currentGroupIdx;
          return '<div class="flex items-center gap-2 text-sm ' + (isActive ? 'bg-blue-50 dark:bg-blue-900/20 rounded px-2 py-1' : '') + '"><span class="font-semibold text-blue-600">' + splitT.group + ' ' + (i+1) + (isActive ? ' ←' : '') + ':</span><span class="text-slate-600 dark:text-slate-300">' + (pages || '—') + ' (' + g.length + ' ' + splitT.pages + ')</span>' + (splitGroups.length > 1 ? '<button class="text-red-400 hover:text-red-600 text-xs" data-del-group="' + i + '">✕</button>' : '') + '</div>';
        }).join('');
        groupsDisplay.querySelectorAll('[data-del-group]').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.delGroup);
            splitGroups.splice(idx, 1);
            if (currentGroupIdx >= splitGroups.length) currentGroupIdx = splitGroups.length - 1;
            renderGroups();
            rerenderPreviewSelectable();
          });
        });
      }

      async function rerenderPreviewSelectable() {
        if (!pdfFile) return;
        const pa = document.getElementById('preview-area');
        pa.innerHTML = '<p class="text-sm text-slate-500 text-center mb-3">Loading...</p>';
        const assigned = Array.from(getAssignedPages());
        const disabledLabel = lang === 'ar' ? 'مخصص' : 'Assigned';
        await PDFTools.renderPDFPreview(pa, pdfFile, {
          maxPages: 20, scale: 0.4, selectable: true,
          disabledPages: assigned, disabledLabel,
          onSelectionChange: (pages) => {
            splitGroups[currentGroupIdx] = pages;
            renderGroups();
          }
        });
      }

      newGroupBtn.addEventListener('click', () => {
        splitGroups.push([]);
        currentGroupIdx = splitGroups.length - 1;
        renderGroups();
        rerenderPreviewSelectable();
      });

      document.querySelectorAll('input[name="split-mode"]').forEach(r => {
        r.addEventListener('change', () => {
          const mode = r.value;
          document.getElementById('ranges-input').classList.toggle('hidden', mode !== 'ranges' && r.checked);
          document.getElementById('every-input').classList.toggle('hidden', mode !== 'every' && r.checked);
          document.getElementById('preview-select').classList.toggle('hidden', mode !== 'preview' && r.checked);
          previewHint.classList.toggle('hidden', mode !== 'preview' || !r.checked);
          if (mode === 'preview' && r.checked) {
            previewHint.textContent = lang === 'ar' ? 'انقر على الصفحات لإضافتها للمجموعة الحالية. الصفحات المخصصة لمجموعة أخرى لا يمكن اختيارها. أنشئ مجموعة جديدة لملف منفصل.' : 'Click pages to add them to the current group. Assigned pages are locked. Create a new group for a separate file.';
            splitGroups = [[]]; currentGroupIdx = 0;
            rerenderPreviewSelectable();
            renderGroups();
          } else {
            previewHint.classList.add('hidden');
          }
        });
      });

      function parseRanges(str, max) {
        const parts = str.split(',').map(s => s.trim()).filter(Boolean);
        const ranges = [];
        for (const p of parts) {
          if (p.includes('-')) {
            const [a, b] = p.split('-').map(n => parseInt(n.trim()));
            if (isNaN(a) || isNaN(b) || a < 1 || b > max || a > b) throw new Error(splitT.invalidRange + ': ' + p);
            ranges.push([a, b]);
          } else {
            const n = parseInt(p);
            if (isNaN(n) || n < 1 || n > max) throw new Error(splitT.invalidRange + ': ' + p);
            ranges.push([n, n]);
          }
        }
        return ranges;
      }

      splitBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(splitT.noFile); return; }
        splitBtn.disabled = true;
        results.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);

        try {
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const srcBytes = await pdfFile.arrayBuffer();
          const src = await PDFDocument.load(srcBytes, { ignoreEncryption: true });

          const mode = document.querySelector('input[name="split-mode"]:checked').value;
          let ranges = [];
          if (mode === 'ranges') {
            ranges = parseRanges(document.getElementById('ranges').value, pageCount);
          } else if (mode === 'each') {
            for (let i = 1; i <= pageCount; i++) ranges.push([i, i]);
          } else if (mode === 'every') {
            const n = Math.max(1, parseInt(document.getElementById('every-n').value) || 1);
            for (let i = 1; i <= pageCount; i += n) ranges.push([i, Math.min(i + n - 1, pageCount)]);
          } else if (mode === 'preview') {
            // Build ranges from splitGroups — each group becomes a file
            splitGroups.forEach((group, gi) => {
              if (group.length) {
                const sorted = group.slice().sort((a, b) => a - b);
                // Convert to ranges (consecutive pages merged)
                let start = sorted[0] + 1;
                let prev = sorted[0];
                for (let k = 1; k < sorted.length; k++) {
                  if (sorted[k] !== prev + 1) {
                    ranges.push([start, prev + 1]);
                    start = sorted[k] + 1;
                  }
                  prev = sorted[k];
                }
                ranges.push([start, prev + 1]);
              }
            });
          }

          if (!ranges.length) { PDFTools.toast(splitT.invalidRange); return; }

          const blobs = [];
          for (let i = 0; i < ranges.length; i++) {
            const [start, end] = ranges[i];
            const out = await PDFDocument.create();
            const indices = [];
            for (let p = start - 1; p < end; p++) indices.push(p);
            const pages = await out.copyPages(src, indices);
            pages.forEach(pg => out.addPage(pg));
            const outBytes = await out.save();
            blobs.push({ name: `split_${start}-${end}.pdf`, blob: new Blob([outBytes], { type: 'application/pdf' }) });
            PDFTools.showProgress(progressArea, Math.round(((i + 1) / ranges.length) * 90));
          }

          PDFTools.showProgress(progressArea, 100);
          results.classList.remove('hidden');
          results.innerHTML = blobs.map((b, i) => `
            <div class="file-item animate-fade-up">
              <div class="file-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
              <div class="file-info"><div class="file-name">${b.name}</div><div class="file-meta">${PDFTools.formatBytes(b.blob.size)}</div></div>
              <button class="btn-pdf btn-pdf-secondary text-xs" data-download="${i}">${splitT.downloadAll.split(' (')[0]}</button>
            </div>
          `).join('') + (blobs.length > 1 ? `<div class="text-center pt-4"><button id="download-zip" class="btn-pdf btn-pdf-primary">📦 ${splitT.downloadAll}</button></div>` : '');

          results.querySelectorAll('[data-download]').forEach(btn => {
            btn.addEventListener('click', () => {
              const idx = parseInt(btn.dataset.download);
              PDFTools.downloadBlob(blobs[idx].blob, blobs[idx].name);
            });
          });

          const zipBtn = document.getElementById('download-zip');
          if (zipBtn) {
            zipBtn.addEventListener('click', async () => {
              const JSZip = await PDFTools.ensureJSZip();
              const zip = new JSZip();
              blobs.forEach(b => zip.file(b.name, b.blob));
              const content = await zip.generateAsync({ type: 'blob' });
              PDFTools.downloadBlob(content, 'split_pdf.zip');
            });
          }

          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          splitBtn.disabled = false;
        }
      });
    });
  </script>

<script defer src="../js/ai-assistant.js"></script>
</body>
