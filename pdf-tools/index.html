  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();

      // Category filters
      const cats = ['organize', 'compress', 'convertTo', 'convertFrom', 'edit', 'security', 'ocr', 'ai'];
      const filterContainer = document.getElementById('category-filters');
      let activeCat = 'all';

      function renderFilters() {
        const allLabel = lang === 'ar' ? 'الكل' : 'All';
        let html = `<button class="cat-filter text-xs font-semibold px-4 py-2 rounded-full transition-colors ${activeCat === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200'}" data-cat="all">${allLabel}</button>`;
        cats.forEach(c => {
          const isActive = activeCat === c;
          html += `<button class="cat-filter text-xs font-semibold px-4 py-2 rounded-full transition-colors ${isActive ? 'bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200'}" data-cat="${c}">${PDFTools.t('categories.' + c)}</button>`;
        });
        filterContainer.innerHTML = html;
        filterContainer.querySelectorAll('.cat-filter').forEach(btn => {
          btn.addEventListener('click', () => { activeCat = btn.dataset.cat; renderFilters(); renderTools(); });
        });
      }

      function toolCard(tool) {
        const tKey = 'tools.' + tool.key;
        const title = PDFTools.t(tKey + '.title');
        const desc = PDFTools.t(tKey + '.desc');
        return `
          <a href="./${tool.slug}.html" class="tool-card group animate-fade-up" data-tool-key="${tool.key}" data-tool-cat="${tool.cat}">
            <div class="flex items-start justify-between">
              <div class="text-3xl">${tool.icon}</div>
              ${tool.clientSide ? '<span class="cat-badge bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400">Browser</span>' : '<span class="cat-badge bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400">Cloud</span>'}
            </div>
            <div>
              <h3 class="font-bold text-sm group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${title}</h3>
              <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 line-clamp-2">${desc}</p>
            </div>
          </a>
        `;
      }

      function renderTools() {
        const search = document.getElementById('tool-search').value.toLowerCase().trim();
        const popularEl = document.getElementById('popular-tools');
        const allEl = document.getElementById('all-tools');
        const popularSection = document.getElementById('popular-section');
        const allSection = document.getElementById('all-tools-section');
        const noResults = document.getElementById('no-results');

        let filtered = window.PDF_TOOLS_REGISTRY;
        if (activeCat !== 'all') filtered = filtered.filter(t => t.cat === activeCat);
        if (search) {
          filtered = filtered.filter(t => {
            const title = PDFTools.t('tools.' + t.key + '.title').toLowerCase();
            const desc = PDFTools.t('tools.' + t.key + '.desc').toLowerCase();
            return title.includes(search) || desc.includes(search) || t.slug.includes(search);
          });
        }

        if (filtered.length === 0) {
          popularSection.classList.add('hidden');
          allSection.classList.add('hidden');
          noResults.classList.remove('hidden');
          return;
        }

        noResults.classList.add('hidden');

        // Popular tools (only when no search and all categories)
        if (!search && activeCat === 'all') {
          popularSection.classList.remove('hidden');
          const popular = filtered.filter(t => t.popular);
          popularEl.innerHTML = popular.map(toolCard).join('');
        } else {
          popularSection.classList.add('hidden');
        }

        // All tools
        allSection.classList.remove('hidden');
        allEl.innerHTML = filtered.map(toolCard).join('');
      }

      // Search
      let searchTimer;
      document.getElementById('tool-search').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderTools, 200);
      });

      renderFilters();
      renderTools();
    });
  </script>
