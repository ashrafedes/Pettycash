          <div class="file-info"><div class="file-name" id="file-name-display"></div><div class="file-meta" id="file-meta-display"></div></div>

              <option value="1">1x (72 DPI)</option>
              <option value="2" selected>2x (144 DPI)</option>

              <span id="convert-btn-label">Convert to PNG</span>
            </button>
          </div>
        </div>
        <div id="progress-area"></div>

          <div class="text-center">
            <div class="text-4xl mb-3">✅</div>

            <button id="download-zip-btn" class="btn-pdf btn-pdf-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span id="download-zip-label">Download All (ZIP)</span>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'PDF إلى PNG', desc: 'تحويل صفحات PDF إلى صور PNG عالية الجودة. جودة بدون فقدان، اختر الدقة.',
        convertBtn: 'تحويل إلى PNG', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        downloadZip: 'تحميل الكل (ZIP)', imagesConverted: 'صورة محولة', scale: 'الدقة:'
      } : {
        title: 'PDF to PNG', desc: 'Convert PDF pages to high-quality PNG images. Lossless quality, choose resolution.',
        convertBtn: 'Convert to PNG', pageCount: 'pages', noFile: 'Select a PDF file first',
        downloadZip: 'Download All (ZIP)', imagesConverted: 'images converted', scale: 'Resolution:'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('convert-btn-label').textContent = T.convertBtn;
      document.getElementById('download-zip-label').textContent = T.downloadZip;
      document.getElementById('scale-label').textContent = T.scale;

      const faqs = lang === 'ar' ? [
        { q: 'هل التحويل مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'ما جودة صور PNG؟', a: 'PNG بدون فقدان. يمكنك اختيار دقة من 1x إلى 3x.' },
        { q: 'هل يمكنني تحميل كل الصفحات؟', a: 'نعم، تحميل جميع صور PNG كأرشيف ZIP.' }
      ] : [
        { q: 'Is PDF to PNG free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'What quality are the PNG images?', a: 'PNG is lossless. You can choose the resolution scale from 1x to 3x.' },
        { q: 'Can I download all pages at once?', a: 'Yes, download all PNG images as a ZIP archive.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pdfToJpg', 'extractImages', 'imageToPdf', 'split'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      let pdfFile = null, pageCount = 0;
      let pngImages = [];
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const convertOptions = document.getElementById('convert-options');
      const convertBtn = document.getElementById('convert-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const imagesGrid = document.getElementById('images-grid');
      const downloadZipBtn = document.getElementById('download-zip-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const pdfjs = await PDFTools.ensurePDFJS();
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buf }).promise;
        pageCount = pdf.numPages; pngImages = [];
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden'); fileInfo.classList.remove('hidden');
        convertOptions.classList.remove('hidden'); result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; pageCount = 0;
        pngImages.forEach(img => { if (img.url) URL.revokeObjectURL(img.url); });
        pngImages = [];
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        document.getElementById('result-summary').textContent = '';
        imagesGrid.innerHTML = '';
        fileInfo.classList.add('hidden');
        convertOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
        progressArea.innerHTML = '';
      });

      convertBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        convertBtn.disabled = true; result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);
        try {
          const pdfjs = await PDFTools.ensurePDFJS();
          const buf = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: buf }).promise;
          const scale = parseFloat(document.getElementById('png-scale').value);
          pngImages = [];

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            const name = 'page_' + String(i).padStart(3, '0') + '.png';
            pngImages.push({ blob, name, url: URL.createObjectURL(blob) });
            PDFTools.showProgress(progressArea, 5 + Math.round((i / pdf.numPages) * 90));
          }

          PDFTools.showProgress(progressArea, 100);
          document.getElementById('result-summary').textContent = pngImages.length + ' ' + T.imagesConverted;
          imagesGrid.innerHTML = pngImages.map((img, idx) =>
            '<div class="relative group bg-white dark:bg-slate-800 rounded-lg p-2 border border-slate-200 dark:border-slate-700">' +
            '<img src="' + img.url + '" class="w-full h-24 object-contain rounded">' +
            '<p class="text-xs text-slate-500 mt-1 truncate">' + img.name + '</p>' +
            '<a href="' + img.url + '" download="' + img.name + '" class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center text-white text-xs font-semibold rounded transition-opacity">' +
            (lang === 'ar' ? 'تحميل' : 'Download') + '</a></div>'
          ).join('');
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err); PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally { convertBtn.disabled = false; }
      });

      downloadZipBtn.addEventListener('click', async () => {
        if (pngImages.length === 0) return;
        const JSZip = await PDFTools.ensureJSZip();
        const zip = new JSZip();
        pngImages.forEach(img => zip.file(img.name, img.blob));
        const blob = await zip.generateAsync({ type: 'blob' });
        PDFTools.downloadBlob(blob, pdfFile.name.replace(/\.pdf$/i, '') + '_png.zip');
      });
    });
  </script>
