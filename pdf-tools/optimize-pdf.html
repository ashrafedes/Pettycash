  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'تحسين PDF', desc: 'تحسين PDF لتحميل أسرع وحجم أصغر بإعادة ترميز الصور وضغط البيانات.',
        optBtn: 'تحسين PDF', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        original: 'الحجم الأصلي', optimized: 'الحجم المحسن', saved: 'تم توفيره'
      } : {
        title: 'Optimize PDF', desc: 'Optimize PDF for faster loading and smaller file size by re-encoding images and compressing streams.',
        optBtn: 'Optimize PDF', pageCount: 'pages', noFile: 'Select a PDF file first',
        original: 'Original size', optimized: 'Optimized size', saved: 'Saved'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('opt-btn-label').textContent = T.optBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل التحسين مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'ماذا يفعل التحسين؟', a: 'يعيد ترميز الصور بجودة مثالية، يزيل الكائنات المكررة، ويضغط تدفقات البيانات.' },
        { q: 'هل سيقلل الجودة؟', a: 'يمكنك اختيار مستوى التحسين. السريع يحافظ على الجودة، بينما الأقصى يقلل الحجم بشكل أكبر.' }
      ] : [
        { q: 'Is optimizing PDF free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'What does optimization do?', a: 'It re-encodes images at optimal quality, removes redundant objects, and compresses data streams.' },
        { q: 'Will it reduce quality?', a: 'You can choose the optimization level. Fast preserves quality, while Max reduces file size more aggressively.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['compress', 'merge', 'split', 'rotate'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // Green highlight for level cards
      function updateLevelCards() {
        document.querySelectorAll('#level-cards .level-card').forEach(card => {
          const radio = card.parentElement.querySelector('input[type="radio"]');
          if (radio.checked) {
            card.style.borderColor = '#16a34a'; card.style.backgroundColor = 'rgba(22,163,74,0.08)'; card.style.color = '#16a34a';
          } else { card.style.borderColor = ''; card.style.backgroundColor = ''; card.style.color = ''; }
        });
      }
      document.querySelectorAll('input[name="opt-level"]').forEach(r => r.addEventListener('change', updateLevelCards));
      updateLevelCards();

      let pdfFile = null, pageCount = 0, resultBlob = null;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const optOptions = document.getElementById('opt-options');
      const optBtn = document.getElementById('opt-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        resultBlob = null;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden'); fileInfo.classList.remove('hidden');
        optOptions.classList.remove('hidden'); result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; resultBlob = null;
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden'); optOptions.classList.add('hidden');
        dropZone.classList.remove('hidden'); result.classList.add('hidden');
        progressArea.innerHTML = '';
      });

      optBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        optBtn.disabled = true; result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);
        try {
          const level = document.querySelector('input[name="opt-level"]:checked').value;
          const qualityMap = { light: 0.92, medium: 0.75, strong: 0.5 };
          const scaleMap = { light: 1.5, medium: 1.0, strong: 0.7 };
          const quality = qualityMap[level], renderScale = scaleMap[level];

          const pdfjs = await PDFTools.ensurePDFJS();
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const buf = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: buf }).promise;
          const newDoc = await PDFDocument.create();

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: renderScale });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            const jpgBlob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
            const jpgBytes = await jpgBlob.arrayBuffer();
            const img = await newDoc.embedJpg(jpgBytes);
            const origSize = page.getViewport({ scale: 1 }).width;
            const origHeight = page.getViewport({ scale: 1 }).height;
            const newPage = newDoc.addPage([origSize, origHeight]);
            newPage.drawImage(img, { x: 0, y: 0, width: origSize, height: origHeight });
            PDFTools.showProgress(progressArea, 10 + Math.round((i / pdf.numPages) * 80));
          }

          const out = await newDoc.save();
          resultBlob = new Blob([out], { type: 'application/pdf' });
          const origSize = pdfFile.size, newSize = resultBlob.size;
          const pct = Math.round((1 - newSize / origSize) * 100);
          document.getElementById('result-stats').innerHTML =
            `<p>${T.original}: ${PDFTools.formatBytes(origSize)}</p>` +
            `<p>${T.optimized}: ${PDFTools.formatBytes(newSize)}</p>` +
            `<p class="text-green-600">${T.saved}: ${pct}%</p>`;
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err); PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally { optBtn.disabled = false; }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_optimized.pdf');
      });
    });
  </script>
