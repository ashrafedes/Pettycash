  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'ضغط PDF', desc: 'تقليل حجم ملف PDF بإعادة ترميز الصور. اختر من ثلاثة مستويات ضغط.',
        level: 'مستوى الضغط', light: 'خفيف', lightDesc: 'جودة عالية', medium: 'متوسط', mediumDesc: 'متوازن', strong: 'قوي', strongDesc: 'أصغر حجم',
        compressBtn: 'ضغط PDF', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        original: 'الحجم الأصلي', compressed: 'الحجم بعد الضغط', saved: 'تم توفيره',
        noImages: 'لا توجد صور في هذا الملف للضغط'
      } : {
        title: 'Compress PDF', desc: 'Reduce PDF file size by re-encoding images. Choose from three compression levels.',
        level: 'Compression level', light: 'Light', lightDesc: 'High quality', medium: 'Medium', mediumDesc: 'Balanced', strong: 'Strong', strongDesc: 'Smallest file',
        compressBtn: 'Compress PDF', pageCount: 'pages', noFile: 'Select a PDF file first',
        original: 'Original size', compressed: 'Compressed size', saved: 'Saved',
        noImages: 'No images found in this PDF to compress'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('level-label').textContent = T.level;
      document.getElementById('opt-light-title').textContent = T.light;
      document.getElementById('opt-light-desc').textContent = T.lightDesc;
      document.getElementById('opt-medium-title').textContent = T.medium;
      document.getElementById('opt-medium-desc').textContent = T.mediumDesc;
      document.getElementById('opt-strong-title').textContent = T.strong;
      document.getElementById('opt-strong-desc').textContent = T.strongDesc;
      document.getElementById('compress-btn-label').textContent = T.compressBtn;

      // Toggle green highlight on level cards
      function updateLevelCards() {
        document.querySelectorAll('#level-cards .level-card').forEach(card => {
          const radio = card.parentElement.querySelector('input[type="radio"]');
          if (radio.checked) {
            card.style.borderColor = '#16a34a';
            card.style.backgroundColor = 'rgba(22,163,74,0.08)';
            card.style.color = '#16a34a';
          } else {
            card.style.borderColor = '';
            card.style.backgroundColor = '';
            card.style.color = '';
          }
        });
      }
      document.querySelectorAll('input[name="compress-level"]').forEach(r => {
        r.addEventListener('change', updateLevelCards);
      });
      updateLevelCards();

      const faqs = lang === 'ar' ? [
        { q: 'هل ضغط PDF مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'كيف يعمل الضغط؟', a: 'يتم إعادة ترميز الصور في الملف بجودة ودقة أقل لتقليل الحجم.' },
        { q: 'ما المستويات المتاحة؟', a: 'ثلاثة مستويات: خفيف (جودة عالية)، متوسط (متوازن)، وقوي (أصغر حجم).' }
      ] : [
        { q: 'Is compressing PDF free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'How does compression work?', a: 'Images in the PDF are re-encoded at lower quality and resolution, reducing the overall file size.' },
        { q: 'What compression levels are available?', a: 'Three levels: Light (high quality), Medium (balanced), and Strong (smallest file).' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pdfToJpg', 'merge', 'split', 'protect'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Compress Logic =====================
      let pdfFile = null, pageCount = 0, resultBlob = null, originalSize = 0;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const compressOptions = document.getElementById('compress-options');
      const compressBtn = document.getElementById('compress-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        originalSize = pdfFile.size;
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        resultBlob = null;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        compressOptions.classList.remove('hidden');
        result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; resultBlob = null;
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden');
        compressOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
        document.getElementById('progress-area').innerHTML = '';
      });

      const LEVELS = {
        light: { scale: 1.5, quality: 0.85 },
        medium: { scale: 1.0, quality: 0.7 },
        strong: { scale: 0.7, quality: 0.5 }
      };

      compressBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        compressBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);

        try {
          const level = document.querySelector('input[name="compress-level"]:checked').value;
          const cfg = LEVELS[level];

          // Use PDF.js to render each page to canvas, then rebuild PDF with compressed images
          const pdfjs = await PDFTools.ensurePDFJS();
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const arrayBuffer = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: arrayBuffer.slice(0) }).promise;
          const newDoc = await PDFDocument.create();
          const total = pdf.numPages;

          for (let i = 1; i <= total; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: cfg.scale });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            const jpgBlob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', cfg.quality));
            const jpgBytes = await jpgBlob.arrayBuffer();
            const img = await newDoc.embedJpg(jpgBytes);
            const newPage = newDoc.addPage([viewport.width, viewport.height]);
            newPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });
            PDFTools.showProgress(progressArea, Math.round((i / total) * 90));
          }

          const out = await newDoc.save({ useObjectStreams: true });
          resultBlob = new Blob([out], { type: 'application/pdf' });
          const compressedSize = resultBlob.size;
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');

          const savedPct = Math.round((1 - compressedSize / originalSize) * 100);
          const savedBytes = originalSize - compressedSize;
          const savedText = savedPct > 0
            ? `<span class="text-green-600 font-bold text-lg">${savedPct}%</span> <span class="text-sm text-slate-500">(${PDFTools.formatBytes(savedBytes)} ${T.saved})</span>`
            : `<span class="text-amber-600 text-sm">${lang === 'ar' ? 'لم يتم تقليل الحجم' : 'No size reduction'}</span>`;

          document.getElementById('result-stats').innerHTML = `
            <div class="flex justify-center gap-6 text-sm">
              <div><span class="text-slate-400">${T.original}:</span> <span class="font-semibold">${PDFTools.formatBytes(originalSize)}</span></div>
              <div><span class="text-slate-400">${T.compressed}:</span> <span class="font-semibold">${PDFTools.formatBytes(compressedSize)}</span></div>
            </div>
            <div>${savedText}</div>
          `;

          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          compressBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_compressed.pdf');
      });
    });
  </script>
