  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is PDF translation free?","a":"Yes, completely free using OpenRouter free models."},{"q":"Are my files uploaded?","a":"Only the extracted text is sent to the AI API. Your PDF file stays in your browser."},{"q":"What languages are supported?","a":"Over 100 languages including English, Arabic, French, Spanish, Chinese, and more."},{"q":"Is the layout preserved?","a":"The translation is provided as text output. The original layout is not preserved."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["aiSummarize","chatPdf","pdfToText","pdfToWord"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let pdfFile=null, translatedText='';
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        pdfFile=f[0];
        const pdfjs=await PDFTools.ensurePDFJS();
        const buf=await pdfFile.arrayBuffer();
        const pdf=await pdfjs.getDocument({data:buf}).promise;
        document.getElementById('file-name-display').textContent=pdfFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(pdfFile.size)+' • '+pdf.numPages+' pages';
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('ai-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }, {accept:'.pdf', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile=null; translatedText='';
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('ai-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      });
      document.getElementById('ai-btn').addEventListener('click', async () => {
        if(!pdfFile){PDFTools.toast('Select a PDF file first');return;}
        const btn=document.getElementById('ai-btn'); btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),10);
        try {
          const pdfjs=await PDFTools.ensurePDFJS();
          const buf=await pdfFile.arrayBuffer();
          const pdf=await pdfjs.getDocument({data:buf}).promise;
          let allText=[];
          const maxPages=Math.min(pdf.numPages,20);
          for(let i=1;i<=maxPages;i++){
            const page=await pdf.getPage(i);
            const content=await page.getTextContent();
            allText.push(content.items.map(item=>item.str).join(' '));
            PDFTools.showProgress(document.getElementById('progress-area'),10+Math.round((i/maxPages)*40));
          }
          let text=allText.join('\n').substring(0,6000);
          const targetLang=document.getElementById('target-lang').value;
          PDFTools.showProgress(document.getElementById('progress-area'),55);
          translatedText=await AI_CONFIG.chat([
            {role:'system',content:'You are a professional translator. Translate the given text to '+targetLang+'. Preserve the meaning and tone. Only output the translation, nothing else.'},
            {role:'user',content:text}
          ]);
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('translation-output').textContent=translatedText;
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+err.message);} finally{btn.disabled=false;}
      });
      document.getElementById('copy-btn').addEventListener('click',()=>{
        navigator.clipboard.writeText(translatedText).then(()=>PDFTools.toast('Copied!'));
      });
      document.getElementById('download-btn').addEventListener('click',()=>{
        if(translatedText){const blob=new Blob([translatedText],{type:'text/plain'});PDFTools.downloadBlob(blob,pdfFile.name.replace(/\.pdf$/i,'')+'_translated.txt');}
      });
    });
  </script>
