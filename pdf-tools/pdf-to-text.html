  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'PDF إلى نص', desc: 'استخراج النص من ملف PDF. تحميل كملف TXT أو نسخ إلى الحافظة.',
        extractBtn: 'استخراج النص', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        copyBtn: 'نسخ النص', copied: 'تم النسخ!', pagesWord: 'صفحة', chars: 'حرف'
      } : {
        title: 'PDF to Text', desc: 'Extract text from your PDF. Download as a TXT file or copy to clipboard.',
        extractBtn: 'Extract Text', pageCount: 'pages', noFile: 'Select a PDF file first',
        copyBtn: 'Copy Text', copied: 'Copied!', pagesWord: 'pages', chars: 'characters'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('extract-btn-label').textContent = T.extractBtn;
      document.getElementById('copy-btn-label').textContent = T.copyBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل استخراج النص مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يمكنني استخراج النص من PDF ممسوح؟', a: 'هذه الأداة تستخرج النص المضمن. للملفات الممسوحة استخدم أداة OCR.' },
        { q: 'ما صيغة المخرجات؟', a: 'ملف نصي عادي (.txt) يمكن فتحه في أي محرر نصوص.' }
      ] : [
        { q: 'Is PDF to Text free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Can I extract text from scanned PDFs?', a: 'This tool extracts embedded text. For scanned PDFs, use our OCR tool.' },
        { q: 'What format is the output?', a: 'Plain text (.txt) file that you can open in any text editor.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pdfToJpg', 'split', 'merge', 'compress'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== PDF to Text Logic =====================
      let pdfFile = null, pageCount = 0, extractedText = '';
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const extractOptions = document.getElementById('extract-options');
      const extractBtn = document.getElementById('extract-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');
      const copyBtn = document.getElementById('copy-btn');
      const textOutput = document.getElementById('text-output');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const pdfjs = await PDFTools.ensurePDFJS();
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buf }).promise;
        pageCount = pdf.numPages;
        extractedText = '';
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        extractOptions.classList.remove('hidden');
        result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile = null; extractedText = '';
        fileInfo.classList.add('hidden');
        extractOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
      });

      extractBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        extractBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          const pdfjs = await PDFTools.ensurePDFJS();
          const buf = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: buf }).promise;
          let allText = [];

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const pageText = content.items.map(item => item.str).join(' ');
            allText.push((lang === 'ar' ? '--- صفحة ' : '--- Page ') + i + ' ---\n' + pageText);
            PDFTools.showProgress(progressArea, 10 + Math.round((i / pdf.numPages) * 80));
          }

          extractedText = allText.join('\n\n');
          textOutput.value = extractedText;
          document.getElementById('result-summary').textContent = pageCount + ' ' + T.pagesWord + ' • ' + extractedText.length + ' ' + T.chars;
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          extractBtn.disabled = false;
        }
      });

      copyBtn.addEventListener('click', () => {
        textOutput.select();
        document.execCommand('copy');
        PDFTools.toast(T.copied);
      });

      downloadBtn.addEventListener('click', () => {
        if (extractedText) {
          const blob = new Blob([extractedText], { type: 'text/plain' });
          PDFTools.downloadBlob(blob, pdfFile.name.replace(/\.pdf$/i, '') + '.txt');
        }
      });
    });
  </script>
