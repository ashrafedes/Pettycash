  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'حذف الصفحات', desc: 'حدد الصفحات التي تريد حذفها من ملف PDF. انقر على المعاينة أو أدخل نطاقات الصفحات.',
        selectMode: 'وضع التحديد', fromPreview: 'اختيار من المعاينة', byRange: 'حسب نطاقات الصفحات',
        removeBtn: 'حذف الصفحات', pageCount: 'صفحة', noSelection: 'لم يتم اختيار صفحات',
        hintPreview: 'انقر على الصفحات لتحديدها للحذف',
        invalidRange: 'نطاق غير صالح', noFile: 'اختر ملف PDF أولاً',
        selectedForRemoval: 'صفحات محددة للحذف', noPagesSelected: 'لم يتم تحديد صفحات',
        removeBadge: '🗑'
      } : {
        title: 'Remove Pages', desc: 'Select pages to remove from your PDF. Click thumbnails or enter page ranges.',
        selectMode: 'Selection mode', fromPreview: 'Select from preview', byRange: 'By page ranges',
        removeBtn: 'Remove Pages', pageCount: 'pages', noSelection: 'No pages selected',
        hintPreview: 'Click pages to mark them for removal',
        invalidRange: 'Invalid range', noFile: 'Select a PDF file first',
        selectedForRemoval: 'Selected for removal', noPagesSelected: 'No pages selected',
        removeBadge: '🗑'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('select-mode-label').textContent = T.selectMode;
      document.getElementById('lbl-from-preview').textContent = T.fromPreview;
      document.getElementById('lbl-by-range').textContent = T.byRange;
      document.getElementById('remove-btn-label').textContent = T.removeBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل حذف الصفحات مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يمكنني التحديد من المعاينة؟', a: 'نعم، انقر على الصفحات لتحديدها للحذف.' }
      ] : [
        { q: 'Is removing PDF pages free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Can I select from preview?', a: 'Yes, click on page thumbnails to select pages to remove.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['extractPages', 'split', 'rotate', 'merge'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // ===================== Remove Pages Logic =====================
      let pdfFile = null, pageCount = 0, resultBlob = null;
      let selectedFromPreview = new Set();
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const removeOptions = document.getElementById('remove-options');
      const removeBtn = document.getElementById('remove-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');
      const previewArea = document.getElementById('preview-area');
      const previewHint = document.getElementById('preview-hint');
      const selectedInfo = document.getElementById('selected-info');
      const selectedLabel = document.getElementById('selected-label');

      function updateSelectedInfo(pages) {
        if (!pages || !pages.length) {
          selectedInfo.classList.add('hidden');
          selectedLabel.textContent = '';
          return;
        }
        const labels = pages.map(p => String(p + 1)).join(', ');
        selectedInfo.classList.remove('hidden');
        selectedLabel.textContent = T.selectedForRemoval + ': ' + labels;
      }

      async function renderPreview(selectable) {
        previewArea.classList.remove('hidden');
        previewArea.innerHTML = '<p class="text-sm text-slate-500 text-center mb-3">Loading preview...</p>';
        const source = resultBlob || pdfFile;
        if (!source) return;
        selectedFromPreview.clear();
        updateSelectedInfo([]);
        await PDFTools.renderPDFPreview(previewArea, source, {
          maxPages: 20, scale: 0.4, selectable,
          selectionClass: 'ring-4 ring-red-500 rounded-lg opacity-75',
          badgeClass: 'select-badge absolute top-1 end-1 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded shadow-lg',
          selectionLabel: T.removeBadge,
          onSelectionChange: (pages) => { selectedFromPreview = new Set(pages); updateSelectedInfo(pages); }
        });
      }

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        resultBlob = null; selectedFromPreview.clear();
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        removeOptions.classList.remove('hidden');
        await renderPreview(true);
        previewHint.classList.remove('hidden');
        previewHint.textContent = T.hintPreview;
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        if (fileInput) fileInput.value = '';
        pdfFile = null; resultBlob = null; selectedFromPreview.clear();
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        fileInfo.classList.add('hidden');
        removeOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
        previewArea.classList.add('hidden');
        previewArea.innerHTML = '';
        previewHint.classList.add('hidden');
        selectedInfo.classList.add('hidden');
        document.getElementById('progress-area').innerHTML = '';
      });

      document.querySelectorAll('input[name="sel-mode"]').forEach(r => {
        r.addEventListener('change', () => {
          const isRanges = r.value === 'ranges' && r.checked;
          document.getElementById('ranges-input').classList.toggle('hidden', !isRanges);
          if (r.value === 'preview' && r.checked) {
            selectedFromPreview.clear();
            selectedInfo.classList.add('hidden');
            renderPreview(true);
            previewHint.classList.remove('hidden');
            previewHint.textContent = T.hintPreview;
          } else if (r.checked) {
            renderPreview(false);
            previewHint.classList.add('hidden');
            selectedInfo.classList.add('hidden');
          }
        });
      });

      function parseRanges(str, max) {
        const parts = str.split(',').map(s => s.trim()).filter(Boolean);
        const set = new Set();
        for (const p of parts) {
          if (p.includes('-')) {
            const [a, b] = p.split('-').map(n => parseInt(n.trim()));
            if (isNaN(a) || isNaN(b) || a < 1 || b > max || a > b) throw new Error(T.invalidRange + ': ' + p);
            for (let i = a; i <= b; i++) set.add(i - 1);
          } else {
            const n = parseInt(p);
            if (isNaN(n) || n < 1 || n > max) throw new Error(T.invalidRange + ': ' + p);
            set.add(n - 1);
          }
        }
        return set;
      }

      removeBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        const mode = document.querySelector('input[name="sel-mode"]:checked').value;
        let pagesToRemove = new Set();
        if (mode === 'preview') {
          pagesToRemove = selectedFromPreview;
          if (!pagesToRemove.size) { PDFTools.toast(T.noSelection); return; }
        } else {
          try { pagesToRemove = parseRanges(document.getElementById('page-ranges').value, pageCount); }
          catch (e) { PDFTools.toast(e.message); return; }
          if (!pagesToRemove.size) { PDFTools.toast(T.noSelection); return; }
        }
        removeBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);
        try {
          const { PDFDocument } = await PDFTools.ensurePDFLib();
          const bytes = await pdfFile.arrayBuffer();
          const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
          const pagesToKeep = [];
          for (let i = 0; i < pageCount; i++) { if (!pagesToRemove.has(i)) pagesToKeep.push(i); }
          if (!pagesToKeep.length) { PDFTools.toast(lang === 'ar' ? 'لا يمكن حذف جميع الصفحات' : 'Cannot remove all pages'); removeBtn.disabled = false; return; }
          const newDoc = await PDFDocument.create();
          const copied = await newDoc.copyPages(doc, pagesToKeep);
          copied.forEach(p => newDoc.addPage(p));
          PDFTools.showProgress(progressArea, 80);
          const out = await newDoc.save();
          resultBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          selectedFromPreview.clear();
          const stillPreview = document.querySelector('input[name="sel-mode"]:checked').value === 'preview';
          await renderPreview(stillPreview);
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          removeBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_removed.pdf');
      });
    });
  </script>
