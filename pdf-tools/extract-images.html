  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'استخراج الصور من PDF', desc: 'استخراج جميع الصور المضمنة في ملف PDF. تحميل فردي أو كملف ZIP.',
        extractBtn: 'استخراج الصور', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً',
        downloadZip: 'تحميل الكل (ZIP)', imagesFound: 'صورة مستخرجة', noImages: 'لا توجد صور في هذا الملف'
      } : {
        title: 'Extract Images from PDF', desc: 'Extract all images embedded in your PDF. Download individually or as a ZIP.',
        extractBtn: 'Extract Images', pageCount: 'pages', noFile: 'Select a PDF file first',
        downloadZip: 'Download All (ZIP)', imagesFound: 'images found', noImages: 'No images found in this PDF'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('extract-btn-label').textContent = T.extractBtn;
      document.getElementById('download-zip-label').textContent = T.downloadZip;

      const faqs = lang === 'ar' ? [
        { q: 'هل الاستخراج مجاني؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'ما صيغة الصور المستخرجة؟', a: 'الصور تُستخرج بصيغتها الأصلية (JPG، PNG، إلخ) كما هي مضمنة في PDF.' },
        { q: 'هل يمكنني تحميل كل الصور دفعة واحدة؟', a: 'نعم، يمكنك تحميل جميع الصور كأرشيف ZIP.' }
      ] : [
        { q: 'Is extracting images free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'What format are extracted images?', a: 'Images are extracted in their original format (JPG, PNG, etc.) as embedded in the PDF.' },
        { q: 'Can I download all images at once?', a: 'Yes, you can download all images as a ZIP archive.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pdfToJpg', 'imageToPdf', 'split', 'merge'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      let pdfFile = null, pageCount = 0;
      let extractedImages = []; // {blob, name, url}
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const extractOptions = document.getElementById('extract-options');
      const extractBtn = document.getElementById('extract-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const imagesGrid = document.getElementById('images-grid');
      const downloadZipBtn = document.getElementById('download-zip-btn');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const pdfjs = await PDFTools.ensurePDFJS();
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buf }).promise;
        pageCount = pdf.numPages;
        extractedImages = [];
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        extractOptions.classList.remove('hidden');
        result.classList.add('hidden');
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile = null; extractedImages = [];
        fileInfo.classList.add('hidden');
        extractOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
      });

      extractBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        extractBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          const pdfjs = await PDFTools.ensurePDFJS();
          const buf = await pdfFile.arrayBuffer();
          const pdf = await pdfjs.getDocument({ data: buf }).promise;
          extractedImages = [];
          let imgIdx = 0;

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const ops = await page.getOperatorList();
            const fnArray = ops.fnArray;
            const argsArray = ops.argsArray;

            for (let j = 0; j < fnArray.length; j++) {
              // OPS.paintImageXObject = 85, OPS.paintInlineImage = 87
              if (fnArray[j] === 85 || fnArray[j] === 87) {
                try {
                  let imgData;
                  if (fnArray[j] === 85) {
                    // Named image - get from page.objs
                    const name = argsArray[j][0];
                    imgData = await new Promise((resolve) => {
                      page.objs.get(name, resolve);
                    });
                  } else {
                    // Inline image
                    imgData = argsArray[j][0];
                  }

                  if (imgData && imgData.data) {
                    const canvas = document.createElement('canvas');
                    canvas.width = imgData.width;
                    canvas.height = imgData.height;
                    const ctx = canvas.getContext('2d');

                    // Handle different color spaces
                    const data = imgData.data;
                    let imageData;
                    if (data.length === imgData.width * imgData.height * 4) {
                      imageData = new ImageData(new Uint8ClampedArray(data), imgData.width, imgData.height);
                    } else if (data.length === imgData.width * imgData.height * 3) {
                      // RGB to RGBA
                      const rgba = new Uint8ClampedArray(imgData.width * imgData.height * 4);
                      for (let k = 0; k < data.length; k += 3) {
                        rgba[k / 3 * 4] = data[k];
                        rgba[k / 3 * 4 + 1] = data[k + 1];
                        rgba[k / 3 * 4 + 2] = data[k + 2];
                        rgba[k / 3 * 4 + 3] = 255;
                      }
                      imageData = new ImageData(rgba, imgData.width, imgData.height);
                    } else if (data.length === imgData.width * imgData.height) {
                      // Grayscale to RGBA
                      const rgba = new Uint8ClampedArray(imgData.width * imgData.height * 4);
                      for (let k = 0; k < data.length; k++) {
                        rgba[k * 4] = data[k];
                        rgba[k * 4 + 1] = data[k];
                        rgba[k * 4 + 2] = data[k];
                        rgba[k * 4 + 3] = 255;
                      }
                      imageData = new ImageData(rgba, imgData.width, imgData.height);
                    }

                    if (imageData) {
                      ctx.putImageData(imageData, 0, 0);
                      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                      const name = 'image_p' + i + '_' + (imgIdx + 1) + '.png';
                      extractedImages.push({ blob, name, url: URL.createObjectURL(blob) });
                      imgIdx++;
                    }
                  }
                } catch (e) { /* skip problematic images */ }
              }
            }
            PDFTools.showProgress(progressArea, 10 + Math.round((i / pdf.numPages) * 80));
          }

          PDFTools.showProgress(progressArea, 100);

          if (extractedImages.length === 0) {
            PDFTools.toast(T.noImages);
          } else {
            document.getElementById('result-summary').textContent = extractedImages.length + ' ' + T.imagesFound;
            imagesGrid.innerHTML = extractedImages.map((img, idx) => 
              '<div class="relative group bg-white dark:bg-slate-800 rounded-lg p-2 border border-slate-200 dark:border-slate-700">' +
              '<img src="' + img.url + '" class="w-full h-24 object-contain rounded">' +
              '<p class="text-xs text-slate-500 mt-1 truncate">' + img.name + '</p>' +
              '<a href="' + img.url + '" download="' + img.name + '" class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center text-white text-xs font-semibold rounded transition-opacity">' +
              (lang === 'ar' ? 'تحميل' : 'Download') + '</a></div>'
            ).join('');
            result.classList.remove('hidden');
            PDFTools.toast(PDFTools.t('common.done'));
          }
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          extractBtn.disabled = false;
        }
      });

      downloadZipBtn.addEventListener('click', async () => {
        if (extractedImages.length === 0) return;
        const JSZip = await PDFTools.ensureJSZip();
        const zip = new JSZip();
        extractedImages.forEach(img => zip.file(img.name, img.blob));
        const blob = await zip.generateAsync({ type: 'blob' });
        PDFTools.downloadBlob(blob, pdfFile.name.replace(/\.pdf$/i, '') + '_images.zip');
      });
    });
  </script>
