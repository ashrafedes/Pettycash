  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is editing PDF free?","a":"Yes, completely free."},{"q":"Are my files uploaded?","a":"No. All processing happens in your browser."},{"q":"Can I add text?","a":"Yes, click anywhere on the page to add text."},{"q":"Can I add shapes?","a":"Yes, draw rectangles and lines on any page."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["watermark","pageNumbers","sign","crop"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let pdfFile=null, resultBlob=null;
      let annotations={}; let currentPageIndex=0; let pageSizes=[];
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        pdfFile=f[0]; resultBlob=null; annotations={}; currentPageIndex=0;
        const {PDFDocument}=await PDFTools.ensurePDFLib();
        const bytes=await pdfFile.arrayBuffer();
        const doc=await PDFDocument.load(bytes,{ignoreEncryption:true});
        pageSizes=doc.getPages().map(p=>p.getSize());
        document.getElementById('file-name-display').textContent=pdfFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(pdfFile.size)+' • '+doc.getPageCount()+' pages';
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('edit-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
        await renderEditPreview();
      }, {accept:'.pdf', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile=null; resultBlob=null; annotations={};
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('edit-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
        document.getElementById('preview-area').innerHTML='';
      });
      async function renderEditPreview(){
        const pa=document.getElementById('preview-area');
        pa.innerHTML='<p class="text-sm text-slate-500">Loading...</p>';
        const pdfjs=await PDFTools.ensurePDFJS();
        const buf=await pdfFile.arrayBuffer();
        const pdf=await pdfjs.getDocument({data:buf}).promise;
        const page=await pdf.getPage(currentPageIndex+1);
        const viewport=page.getViewport({scale:1});
        const scale=Math.min(600/viewport.width,650/viewport.height);
        const sv=page.getViewport({scale});
        const wrapper=document.createElement('div'); wrapper.className='inline-block';
        const nav=document.createElement('div'); nav.className='flex items-center gap-3 mb-3 justify-center';
        nav.innerHTML='<button id="prev-p" class="px-3 py-1 rounded-lg bg-slate-200 dark:bg-slate-700 text-sm '+(currentPageIndex===0?'opacity-50':'')+'">‹</button><span class="text-sm font-semibold">'+(currentPageIndex+1)+' / '+pdf.numPages+'</span><button id="next-p" class="px-3 py-1 rounded-lg bg-slate-200 dark:bg-slate-700 text-sm '+(currentPageIndex===pdf.numPages-1?'opacity-50':'')+'">›</button>';
        wrapper.appendChild(nav);
        const container=document.createElement('div'); container.className='relative inline-block border-2 border-slate-300 dark:border-slate-600 rounded-lg overflow-hidden';
        const canvas=document.createElement('canvas'); canvas.width=sv.width; canvas.height=sv.height; canvas.className='block';
        const ctx=canvas.getContext('2d');
        await page.render({canvasContext:ctx,viewport:sv}).promise;
        container.appendChild(canvas);
        // Draw existing annotations
        if(annotations[currentPageIndex]){annotations[currentPageIndex].forEach(a=>{
          if(a.type==='text'){const el=document.createElement('div');el.className='absolute pointer-events-none';el.style.left=(a.x/viewport.width*sv.width)+'px';el.style.top=((viewport.height-a.y-a.size)/viewport.height*sv.height)+'px';el.style.color=a.color;el.style.fontSize=(a.size*scale)+'px';el.textContent=a.text;container.appendChild(el);}
          else if(a.type==='rect'){const el=document.createElement('div');el.className='absolute pointer-events-none border-2';el.style.left=(a.x/viewport.width*sv.width)+'px';el.style.top=((viewport.height-a.y-a.h)/viewport.height*sv.height)+'px';el.style.width=(a.w/viewport.width*sv.width)+'px';el.style.height=(a.h/viewport.height*sv.height)+'px';el.style.borderColor=a.color;container.appendChild(el);}
        });}
        const overlay=document.createElement('div'); overlay.className='absolute inset-0 cursor-crosshair';
        let isDragging=false,startX=0,startY=0;
        overlay.addEventListener('mousedown',(e)=>{
          const rect=overlay.getBoundingClientRect();
          startX=e.clientX-rect.left; startY=e.clientY-rect.top;
          const mode=document.getElementById('edit-mode').value;
          if(mode==='text'){
            const text=document.getElementById('edit-text').value;
            if(!text)return;
            const color=document.getElementById('edit-color').value;
            const size=parseInt(document.getElementById('edit-size').value)||14;
            if(!annotations[currentPageIndex])annotations[currentPageIndex]=[];
            annotations[currentPageIndex].push({type:'text',text,color,size,x:(startX/rect.width)*viewport.width,y:viewport.height-((startY+size)/rect.height)*viewport.height});
            renderEditPreview();
          } else {
            isDragging=true;
            const box=document.createElement('div');box.className='absolute border-2 pointer-events-none';box.style.left=startX+'px';box.style.top=startY+'px';box.style.borderColor=document.getElementById('edit-color').value;container.appendChild(box);
            overlay._box=box;
          }
        });
        overlay.addEventListener('mousemove',(e)=>{
          if(!isDragging||!overlay._box)return;
          const rect=overlay.getBoundingClientRect();
          const x=Math.max(0,Math.min(e.clientX-rect.left,rect.width));
          const y=Math.max(0,Math.min(e.clientY-rect.top,rect.height));
          overlay._box.style.left=Math.min(startX,x)+'px';overlay._box.style.top=Math.min(startY,y)+'px';
          overlay._box.style.width=Math.abs(x-startX)+'px';overlay._box.style.height=Math.abs(y-startY)+'px';
        });
        overlay.addEventListener('mouseup',()=>{
          if(!isDragging||!overlay._box)return;isDragging=false;
          const pw=parseFloat(overlay._box.style.width),ph=parseFloat(overlay._box.style.height);
          if(pw<5||ph<5){overlay._box.remove();overlay._box=null;return;}
          const rect=overlay.getBoundingClientRect();
          const px=parseFloat(overlay._box.style.left),py=parseFloat(overlay._box.style.top);
          if(!annotations[currentPageIndex])annotations[currentPageIndex]=[];
          annotations[currentPageIndex].push({type:'rect',color:document.getElementById('edit-color').value,x:(px/rect.width)*viewport.width,y:viewport.height-((py+ph)/rect.height)*viewport.height,w:(pw/rect.width)*viewport.width,h:(ph/rect.height)*viewport.height});
          overlay._box=null;renderEditPreview();
        });
        container.appendChild(overlay);wrapper.appendChild(container);
        pa.innerHTML='';pa.appendChild(wrapper);
        document.getElementById('prev-p')?.addEventListener('click',()=>{if(currentPageIndex>0){currentPageIndex--;renderEditPreview();}});
        document.getElementById('next-p')?.addEventListener('click',()=>{if(currentPageIndex<pdf.numPages-1){currentPageIndex++;renderEditPreview();}});
      }
      document.getElementById('save-btn').addEventListener('click',async()=>{
        if(!pdfFile)return;
        const btn=document.getElementById('save-btn');btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),10);
        try{
          const {PDFDocument,rgb}=await PDFTools.ensurePDFLib();
          const bytes=await pdfFile.arrayBuffer();
          const doc=await PDFDocument.load(bytes,{ignoreEncryption:true});
          const pages=doc.getPages();
          pages.forEach((page,idx)=>{
            const anns=annotations[idx];if(!anns)return;
            anns.forEach(a=>{
              if(a.type==='text'){
                // Draw text as image for Unicode support
                // For simplicity, use drawText with sanitized text
                const sanitized=a.text.replace(/[^\x00-\x7F\xA0-\xFF]/g,'?');
                if(sanitized)page.drawText(sanitized,{x:a.x,y:a.y,size:a.size,color:rgb(parseInt(a.color.slice(1,3),16)/255,parseInt(a.color.slice(3,5),16)/255,parseInt(a.color.slice(5,7),16)/255)});
              } else if(a.type==='rect'){
                page.drawRectangle({x:a.x,y:a.y,width:a.w,height:a.h,borderColor:rgb(parseInt(a.color.slice(1,3),16)/255,parseInt(a.color.slice(3,5),16)/255,parseInt(a.color.slice(5,7),16)/255),borderWidth:2});
              }
            });
            PDFTools.showProgress(document.getElementById('progress-area'),10+Math.round((idx/pages.length)*80));
          });
          const out=await doc.save();
          resultBlob=new Blob([out],{type:'application/pdf'});
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        }catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+err.message);}finally{btn.disabled=false;}
      });
      document.getElementById('download-btn').addEventListener('click',()=>{if(resultBlob)PDFTools.downloadBlob(resultBlob,pdfFile.name.replace(/\.pdf$/i,'')+'_edited.pdf');});
    });
  </script>
