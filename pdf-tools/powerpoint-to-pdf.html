  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is PowerPoint to PDF free?","a":"Yes, completely free."},{"q":"Are my files uploaded?","a":"No. All processing happens in your browser."},{"q":"What formats are supported?","a":"PPTX files from Microsoft PowerPoint and Google Slides."},{"q":"Will animations be preserved?","a":"Animations are not preserved in PDF. Each slide becomes a static page."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["wordToPdf","excelToPdf","imageToPdf","merge"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let pptFile=null, resultBlob=null;
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        pptFile=f[0]; resultBlob=null;
        document.getElementById('file-name-display').textContent=pptFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(pptFile.size);
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('convert-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }, {accept:'.pptx', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        pptFile=null; resultBlob=null;
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('convert-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      });
      document.getElementById('convert-btn').addEventListener('click', async () => {
        if(!pptFile){PDFTools.toast('Select a PPTX file first');return;}
        const btn=document.getElementById('convert-btn'); btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),10);
        try {
          const JSZip=await PDFTools.ensureJSZip();
          const {PDFDocument}=await PDFTools.ensurePDFLib();
          const buf=await pptFile.arrayBuffer();
          const zip=await JSZip.loadAsync(buf);
          const doc=await PDFDocument.create();
          // Find slide files
          const slideFiles=Object.keys(zip.files).filter(k=>k.match(/ppt\/slides\/slide\d+\.xml/)).sort((a,b)=>{
            const na=parseInt(a.match(/slide(\d+)/)[1]); const nb=parseInt(b.match(/slide(\d+)/)[1]); return na-nb;
          });
          PDFTools.showProgress(document.getElementById('progress-area'),20);
          const pageW=720, pageH=540; // PowerPoint default 10x7.5 inches at 72dpi
          for(let i=0;i<slideFiles.length;i++){
            const slideXml=await zip.files[slideFiles[i]].async('string');
            // Extract text from slide XML
            const texts=[];
            const textRe=/<a:t>([^<]*)<\/a:t>/g; let m;
            while((m=textRe.exec(slideXml))!==null) texts.push(m[1]);
            // Create slide as canvas with text
            const canvas=document.createElement('canvas');
            canvas.width=pageW*2; canvas.height=pageH*2;
            const ctx=canvas.getContext('2d');
            ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='#333'; ctx.font='24px Inter,Arial,sans-serif';
            ctx.textBaseline='top';
            let y=40;
            texts.forEach(text=>{
              if(!text.trim()) return;
              ctx.fillText(text, 40, y, canvas.width-80);
              y+=36;
            });
            const jpg=await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.92));
            const embedded=await doc.embedJpg(await jpg.arrayBuffer());
            const page=doc.addPage([pageW,pageH]);
            page.drawImage(embedded,{x:0,y:0,width:pageW,height:pageH});
            PDFTools.showProgress(document.getElementById('progress-area'),20+Math.round((i/slideFiles.length)*75));
          }
          if(doc.getPageCount()===0) doc.addPage([pageW,pageH]);
          const out=await doc.save();
          resultBlob=new Blob([out],{type:'application/pdf'});
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+err.message);} finally{btn.disabled=false;}
      });
      document.getElementById('download-btn').addEventListener('click',()=>{if(resultBlob)PDFTools.downloadBlob(resultBlob,pptFile.name.replace(/\.pptx?$/i,'')+'.pdf');});
    });
  </script>
