        </div>
        <div id="file-info" class="hidden file-item">
          <div class="file-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg></div>
          <div class="file-info"><div class="file-name" id="file-name-display"></div><div class="file-meta" id="file-meta-display"></div></div>

            <button id="ocr-btn" class="btn-pdf btn-pdf-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span id="ocr-btn-label">Extract Text</span></button>
          </div>
        </div>
        <div id="progress-area"></div>

          <div class="text-center"><div class="text-4xl mb-3">✅</div>
            <div class="flex gap-3 justify-center">
              <button id="copy-btn" class="btn-pdf btn-pdf-secondary text-sm"><span id="copy-label">Copy Text</span></button>
              <button id="download-btn" class="btn-pdf btn-pdf-primary text-sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span data-pt="common.download">Download TXT</span></button>
            </div>
          </div>
          <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><textarea id="text-output" dir="auto" class="w-full h-64 text-sm font-mono resize-y bg-transparent outline-none" readonly></textarea></div>

  <footer class="bg-slate-900 text-slate-400 mt-auto"><div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 text-center text-sm"><p>&copy; 2026 PettyCash.site — Free PDF Tools. All processing happens in your browser.</p></div></footer>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'OCR للصور', desc: 'استخراج النص من الصور (JPG، PNG، BMP) باستخدام OCR. لغات متعددة مدعومة.',
        ocrBtn: 'استخراج النص', noFile: 'اختر صورة أولاً', copyBtn: 'نسخ النص', copied: 'تم النسخ!'
      } : {
        title: 'Image OCR', desc: 'Extract text from images (JPG, PNG, BMP) using OCR. Multiple languages supported.',
        ocrBtn: 'Extract Text', noFile: 'Select an image first', copyBtn: 'Copy Text', copied: 'Copied!'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('ocr-btn-label').textContent = T.ocrBtn;
      document.getElementById('copy-label').textContent = T.copyBtn;
      document.getElementById('lang-label').textContent = lang === 'ar' ? 'اللغة' : 'Language';

      const faqs = lang === 'ar' ? [
        { q: 'هل OCR مجاني؟', a: 'نعم، مجاني تماماً باستخدام Tesseract.js.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'ما صيغ الصور المدعومة؟', a: 'JPG، PNG، BMP، WebP، و TIFF.' },
        { q: 'ما اللغات المدعومة؟', a: 'الإنجليزية والعربية والفرنسية والإسبانية والألمانية والصينية واليابانية والمزيد.' }
      ] : [
        { q: 'Is Image OCR free?', a: 'Yes, completely free using Tesseract.js.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'What image formats are supported?', a: 'JPG, PNG, BMP, WebP, and TIFF.' },
        { q: 'What languages are supported?', a: 'English, Arabic, French, Spanish, German, Chinese, Japanese, and more.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['ocrPdf', 'searchablePdf', 'pdfToText', 'extractTables'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      let imageFile = null, extractedText = '';
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const ocrOptions = document.getElementById('ocr-options');
      const ocrBtn = document.getElementById('ocr-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');
      const copyBtn = document.getElementById('copy-btn');
      const textOutput = document.getElementById('text-output');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        imageFile = newFiles[0]; extractedText = '';
        document.getElementById('file-name-display').textContent = imageFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(imageFile.size);
        dropZone.classList.add('hidden'); fileInfo.classList.remove('hidden');
        ocrOptions.classList.remove('hidden'); result.classList.add('hidden');
      }, { accept: 'image/*', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        imageFile = null; extractedText = '';
        fileInfo.classList.add('hidden'); ocrOptions.classList.add('hidden');
        dropZone.classList.remove('hidden'); result.classList.add('hidden');
      });

      async function ensureTesseract() {
        if (window.Tesseract) return window.Tesseract;
        await PDFTools.loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
        return window.Tesseract;
      }

      ocrBtn.addEventListener('click', async () => {
        if (!imageFile) { PDFTools.toast(T.noFile); return; }
        ocrBtn.disabled = true; result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 5);
        try {
          const Tesseract = await ensureTesseract();
          const ocrLang = document.getElementById('ocr-lang').value;
          const worker = await Tesseract.createWorker(ocrLang, 1, {
            logger: m => { if (m.status === 'recognizing text') PDFTools.showProgress(progressArea, 20 + Math.round(m.progress * 70)); }
          });
          const { data } = await worker.recognize(imageFile);
          await worker.terminate();
          extractedText = data.text;
          textOutput.value = extractedText;
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err); PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally { ocrBtn.disabled = false; }
      });

      copyBtn.addEventListener('click', () => { textOutput.select(); document.execCommand('copy'); PDFTools.toast(T.copied); });
      downloadBtn.addEventListener('click', () => {
        if (extractedText) { const blob = new Blob([extractedText], { type: 'text/plain' }); PDFTools.downloadBlob(blob, imageFile.name.replace(/\.[^.]+$/, '') + '_ocr.txt'); }
      });
    });
  </script>
