        </div>

  <footer class="bg-slate-900 text-slate-400 mt-auto"><div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 text-center text-sm"><p>&copy; 2026 PettyCash.site — Free PDF Tools. All processing happens in your browser.</p></div></footer>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is Word to PDF free?","a":"Yes, completely free."},{"q":"Are my files uploaded?","a":"No. All processing happens in your browser."},{"q":"What formats are supported?","a":"DOCX files from Microsoft Word, Google Docs, and other word processors."},{"q":"Will formatting be preserved?","a":"Text, headings, lists, and basic formatting are preserved."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["pdfToWord","excelToPdf","htmlToPdf","textToPdf"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let wordFile=null, resultBlob=null;
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        wordFile=f[0]; resultBlob=null;
        document.getElementById('file-name-display').textContent=wordFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(wordFile.size);
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('convert-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }, {accept:'.docx', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        wordFile=null; resultBlob=null;
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('convert-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      });
      document.getElementById('convert-btn').addEventListener('click', async () => {
        if(!wordFile){PDFTools.toast('Select a DOCX file first');return;}
        const btn=document.getElementById('convert-btn'); btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),10);
        try {
          if(!window.mammoth) await PDFTools.loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js');
          const buf=await wordFile.arrayBuffer();
          PDFTools.showProgress(document.getElementById('progress-area'),30);
          const res=await mammoth.convertToHtml({arrayBuffer:buf});
          const html=res.value;
          PDFTools.showProgress(document.getElementById('progress-area'),50);
          const {PDFDocument}=await PDFTools.ensurePDFLib();
          const doc=await PDFDocument.create();
          const pageW=595.28, pageH=841.89, margin=40, rs=2;
          const cW=pageW*rs, cH=pageH*rs;
          const iframe=document.createElement('iframe');
          iframe.style.cssText='position:fixed;left:-9999px;top:0;width:'+(pageW-margin*2)+'px;border:none;background:#fff';
          document.body.appendChild(iframe);
          const idoc=iframe.contentDocument;
          idoc.open(); idoc.write('<html><head><style>body{font-family:Inter,Arial,sans-serif;font-size:14px;line-height:1.6;color:#333;margin:0}h1{font-size:22px;font-weight:700;margin:12px 0 6px}h2{font-size:18px;font-weight:600;margin:10px 0 4px}h3{font-size:15px;font-weight:600;margin:8px 0 3px}p{margin:6px 0}ul,ol{margin:6px 0;padding-left:20px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:3px 6px}img{max-width:100%}</style></head><body>'+html+'</body></html>'); idoc.close();
          await new Promise(r=>setTimeout(r,300));
          const contentH=idoc.body.scrollHeight;
          const pCH=pageH-margin*2;
          const total=Math.ceil(contentH/pCH)||1;
          for(let i=0;i<total;i++){
            iframe.contentWindow.scrollTo(0,i*pCH);
            await new Promise(r=>setTimeout(r,100));
            const canvas=document.createElement('canvas'); canvas.width=cW; canvas.height=cH;
            const ctx=canvas.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cW,cH);
            const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+cW+'" height="'+cH+'"><foreignObject width="100%" height="100%" style="transform:scale('+rs+');transform-origin:0 0"><div xmlns="http://www.w3.org/1999/xhtml" style="width:'+(pageW-margin*2)+'px;padding:'+margin+'px;font-family:Inter,Arial,sans-serif;font-size:14px;line-height:1.6;color:#333;overflow:hidden;height:'+pageH+'px">'+idoc.body.innerHTML+'</div></foreignObject></svg>';
            const img=new Image();
            await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);});
            ctx.drawImage(img,0,0);
            const jpg=await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.92));
            const embedded=await doc.embedJpg(await jpg.arrayBuffer());
            const page=doc.addPage([pageW,pageH]);
            page.drawImage(embedded,{x:0,y:0,width:pageW,height:pageH});
            PDFTools.showProgress(document.getElementById('progress-area'),50+Math.round((i/total)*45));
          }
          document.body.removeChild(iframe);
          const out=await doc.save();
          resultBlob=new Blob([out],{type:'application/pdf'});
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+err.message);} finally{btn.disabled=false;}
      });
      document.getElementById('download-btn').addEventListener('click',()=>{if(resultBlob)PDFTools.downloadBlob(resultBlob,wordFile.name.replace(/\.docx?$/i,'')+'.pdf');});
    });
  </script>
