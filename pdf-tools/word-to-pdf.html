  <script>
    document.addEventListener('DOMContentLoaded', function () {
      PDFTools.initTheme(); PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const faqs = [{"q":"Is Word to PDF free?","a":"Yes, completely free."},{"q":"Are my files uploaded?","a":"No. All processing happens in your browser."},{"q":"What formats are supported?","a":"DOCX files from Microsoft Word, Google Docs, and other word processors."},{"q":"Will formatting be preserved?","a":"Text, headings, lists, and basic formatting are preserved."}];
      document.getElementById('faq-list').innerHTML = faqs.map(f => '<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">'+f.q+'</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">'+f.a+'</p></details>').join('');
      const related = ["pdfToWord","excelToPdf","htmlToPdf","textToPdf"];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return '<a href="./'+tool.slug+'.html" class="tool-card text-center"><div class="text-2xl">'+tool.icon+'</div><p class="text-xs font-semibold mt-1">'+PDFTools.t('tools.'+tool.key+'.title')+'</p></a>';
      }).join('');
      
      let wordFile=null, resultBlob=null;
      PDFTools.initDropZone(document.getElementById('drop-zone'), document.getElementById('file-input'), async (f) => {
        wordFile=f[0]; resultBlob=null;
        document.getElementById('file-name-display').textContent=wordFile.name;
        document.getElementById('file-meta-display').textContent=PDFTools.formatBytes(wordFile.size);
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('convert-options').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
      }, {accept:'.docx', multiple:false});
      document.getElementById('remove-file').addEventListener('click', () => {
        document.getElementById('file-input').value = '';
        wordFile=null; resultBlob=null;
        document.getElementById('file-name-display').textContent = '';
        document.getElementById('file-meta-display').textContent = '';
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('convert-options').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
        document.getElementById('progress-area').innerHTML = '';
      });
      document.getElementById('convert-btn').addEventListener('click', async () => {
        if(!wordFile){PDFTools.toast('Select a DOCX file first');return;}
        const btn=document.getElementById('convert-btn'); btn.disabled=true;
        document.getElementById('result').classList.add('hidden');
        PDFTools.showProgress(document.getElementById('progress-area'),5);
        try {
          // Load docx-preview for high-fidelity DOCX rendering
          if(!window.docx){
            try {
              await PDFTools.loadScript('https://cdn.jsdelivr.net/npm/docx-preview@0.3.1/dist/docx-preview.min.js');
            } catch(e1) {
              try { await PDFTools.loadScript('https://unpkg.com/docx-preview@0.3.1/dist/docx-preview.min.js'); }
              catch(e2) { throw new Error('Failed to load docx-preview library'); }
            }
          }
          // Ensure JSZip is available (docx-preview depends on it)
          await PDFTools.ensureJSZip();
          PDFTools.showProgress(document.getElementById('progress-area'),15);

          const {PDFDocument}=await PDFTools.ensurePDFLib();
          const doc=await PDFDocument.create();

          // Create a hidden container for docx-preview to render into
          const renderContainer=document.createElement('div');
          renderContainer.style.cssText='position:fixed;left:-9999px;top:0;width:794px;background:#fff;';
          document.body.appendChild(renderContainer);

          // Render DOCX with docx-preview — preserves fonts, colors, alignment, tables, images, page breaks
          await docx.renderAsync(wordFile, renderContainer, null, {
            className: 'docx',
            inWrapper: true,
            ignoreWidth: false,
            ignoreHeight: false,
            ignoreFonts: false,
            breakPages: true,
            experimental: true,
            useBase64URL: true,
            renderHeaders: true,
            renderFooters: true,
            renderFootnotes: true,
            renderEndnotes: true
          });
          PDFTools.showProgress(document.getElementById('progress-area'),40);

          // Wait for fonts and images to settle
          await new Promise(r=>setTimeout(r,500));

          // Find rendered pages — docx-preview creates .docx-page wrappers
          const pageEls=renderContainer.querySelectorAll('.docx-page, .docx-wrapper > div');
          const pages=pageEls.length>0?Array.from(pageEls):[renderContainer];

          const rs=2; // render scale for higher quality

          for(let i=0;i<pages.length;i++){
            const pageEl=pages[i];
            const pw=pageEl.offsetWidth||794;
            const ph=pageEl.offsetHeight||1123;
            const cW=pw*rs, cH=ph*rs;

            // Get computed styles from the rendered page
            const computedStyle=window.getComputedStyle(pageEl);
            const bgColor=computedStyle.backgroundColor;

            // Clone the page content for SVG foreignObject
            const cloned=pageEl.cloneNode(true);
            // Collect all styles that apply
            const styleSheets=document.styleSheets;
            let cssText='';
            try{
              for(let s=0;s<styleSheets.length;s++){
                try{cssText+=Array.from(styleSheets[s].cssRules).map(r=>r.cssText).join('\n');}catch(e){}
              }
            }catch(e){}

            // Build SVG with foreignObject
            const xhtml=new XMLSerializer().serializeToString(cloned);
            const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+cW+'" height="'+cH+'"><foreignObject width="100%" height="100%" style="transform:scale('+rs+');transform-origin:0 0"><div xmlns="http://www.w3.org/1999/xhtml" style="width:'+pw+'px;min-height:'+ph+'px;background:'+bgColor+'">'+xhtml+'</div></foreignObject></svg>';

            const canvas=document.createElement('canvas');
            canvas.width=cW; canvas.height=cH;
            const ctx=canvas.getContext('2d');
            ctx.fillStyle='#fff'; ctx.fillRect(0,0,cW,cH);

            const img=new Image();
            await new Promise((res,rej)=>{
              img.onload=res;
              img.onerror=()=>rej(new Error('Failed to render page '+(i+1)));
              img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
            });
            ctx.drawImage(img,0,0);

            // Convert to PDF page — use PNG for better text quality
            const png=await new Promise(r=>canvas.toBlob(r,'image/png'));
            const embedded=await doc.embedPng(await png.arrayBuffer());
            // A4 dimensions in points
            const pdfW=595.28, pdfH=ph/pw*595.28;
            const page=doc.addPage([pdfW,pdfH]);
            page.drawImage(embedded,{x:0,y:0,width:pdfW,height:pdfH});

            PDFTools.showProgress(document.getElementById('progress-area'),40+Math.round((i/pages.length)*55));
          }

          document.body.removeChild(renderContainer);

          if(doc.getPageCount()===0) doc.addPage([595.28,841.89]);
          const out=await doc.save();
          resultBlob=new Blob([out],{type:'application/pdf'});
          PDFTools.showProgress(document.getElementById('progress-area'),100);
          document.getElementById('result').classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch(err){console.error(err);PDFTools.toast(PDFTools.t('common.error')+': '+(err && err.message ? err.message : (typeof err==='string'?err:'Unknown error')));} finally{btn.disabled=false;}
      });
      document.getElementById('download-btn').addEventListener('click',()=>{if(resultBlob)PDFTools.downloadBlob(resultBlob,wordFile.name.replace(/\.docx?$/i,'')+'.pdf');});
    });
  </script>
