  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      PDFTools.initTheme();
      PDFTools.renderNav();
      const lang = PDFTools.getLang();
      const T = lang === 'ar' ? {
        title: 'إضافة علامة مائية', desc: 'إضافة علامة مائية نصية أو مصورة إلى ملف PDF. تخصيص الموضع والشفافية والدوران والحجم.',
        type: 'نوع العلامة', text: 'نص', image: 'صورة', textLabel: 'نص العلامة المائية', imgLabel: 'رفع صورة',
        pos: 'الموضع', center: 'وسط', tl: 'أعلى يسار', tr: 'أعلى يمين', bl: 'أسفل يسار', br: 'أسفل يمين',
        opacity: 'الشفافية', rotation: 'الدوران', size: 'حجم الخط', color: 'اللون',
        wmBtn: 'إضافة علامة مائية', pageCount: 'صفحة', noFile: 'اختر ملف PDF أولاً', noText: 'أدخل نص العلامة المائية', noImage: 'اختر صورة'
      } : {
        title: 'Add Watermark', desc: 'Add text or image watermark to your PDF. Customize position, opacity, rotation, and size.',
        type: 'Watermark type', text: 'Text', image: 'Image', textLabel: 'Watermark text', imgLabel: 'Upload image',
        pos: 'Position', center: 'Center', tl: 'Top Left', tr: 'Top Right', bl: 'Bottom Left', br: 'Bottom Right',
        opacity: 'Opacity', rotation: 'Rotation', size: 'Font size', color: 'Color',
        wmBtn: 'Add Watermark', pageCount: 'pages', noFile: 'Select a PDF file first', noText: 'Enter watermark text', noImage: 'Select an image'
      };
      document.getElementById('bc-title').textContent = T.title;
      document.getElementById('tool-title').textContent = T.title;
      document.getElementById('tool-desc').textContent = T.desc;
      document.getElementById('type-label').textContent = T.type;
      document.getElementById('opt-text').textContent = T.text;
      document.getElementById('opt-image').textContent = T.image;
      document.getElementById('text-label').textContent = T.textLabel;
      document.getElementById('img-label').textContent = T.imgLabel;
      document.getElementById('pos-label').textContent = T.pos;
      document.getElementById('pos-center').textContent = T.center;
      document.getElementById('pos-tl').textContent = T.tl;
      document.getElementById('pos-tr').textContent = T.tr;
      document.getElementById('pos-bl').textContent = T.bl;
      document.getElementById('pos-br').textContent = T.br;
      document.getElementById('opacity-label').textContent = T.opacity;
      document.getElementById('rotation-label').textContent = T.rotation;
      document.getElementById('size-label').textContent = T.size;
      document.getElementById('color-label').textContent = T.color;
      document.getElementById('wm-btn-label').textContent = T.wmBtn;

      const faqs = lang === 'ar' ? [
        { q: 'هل إضافة علامة مائية مجانية؟', a: 'نعم، مجاني تماماً.' },
        { q: 'هل يتم رفع ملفاتي؟', a: 'لا. كل المعالجة تتم في متصفحك.' },
        { q: 'هل يمكنني إضافة نص وصورة؟', a: 'نعم، يمكنك إضافة علامة نصية مع تخصيص الخط واللون والشفافية، أو علامة مصورة.' },
        { q: 'هل يمكنني معاينة العلامة؟', a: 'نعم، المعاينة المباشرة تظهر كيف ستبدو العلامة على الصفحة.' }
      ] : [
        { q: 'Is watermarking PDF free?', a: 'Yes, completely free.' },
        { q: 'Are my files uploaded?', a: 'No. All processing happens in your browser.' },
        { q: 'Can I add text and image watermarks?', a: 'Yes, you can add text watermarks with custom font, color, opacity, and rotation, or image watermarks.' },
        { q: 'Can I preview the watermark?', a: 'Yes, a live preview shows how the watermark will appear on the first page.' }
      ];
      document.getElementById('faq-list').innerHTML = faqs.map(f => `<details class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4"><summary class="font-semibold cursor-pointer text-sm">${f.q}</summary><p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${f.a}</p></details>`).join('');

      const related = ['pageNumbers', 'protect', 'merge', 'rotate'];
      document.getElementById('related-tools').innerHTML = related.map(key => {
        const tool = window.PDF_TOOLS_REGISTRY.find(t => t.key === key);
        if (!tool) return '';
        return `<a href="./${tool.slug}.html" class="tool-card text-center"><div class="text-2xl">${tool.icon}</div><p class="text-xs font-semibold mt-1">${PDFTools.t('tools.' + tool.key + '.title')}</p></a>`;
      }).join('');

      // Style the radio labels for watermark type
      function updateTypeLabels() {
        const textLabel = document.getElementById('text-type-label');
        const imageLabel = document.getElementById('image-type-label');
        const textRadio = textLabel.querySelector('input');
        const imageRadio = imageLabel.querySelector('input');
        if (textRadio.checked) {
          textLabel.style.borderColor = '#2563eb'; textLabel.style.backgroundColor = 'rgba(37,99,235,0.08)'; textLabel.style.color = '#2563eb';
        } else {
          textLabel.style.borderColor = ''; textLabel.style.backgroundColor = ''; textLabel.style.color = '';
        }
        if (imageRadio.checked) {
          imageLabel.style.borderColor = '#2563eb'; imageLabel.style.backgroundColor = 'rgba(37,99,235,0.08)'; imageLabel.style.color = '#2563eb';
        } else {
          imageLabel.style.borderColor = ''; imageLabel.style.backgroundColor = ''; imageLabel.style.color = '';
        }
      }
      document.querySelectorAll('input[name="wm-type"]').forEach(r => {
        r.addEventListener('change', () => {
          updateTypeLabels();
          document.getElementById('text-wm-input').classList.toggle('hidden', r.value !== 'text');
          document.getElementById('image-wm-input').classList.toggle('hidden', r.value !== 'image');
          updateOverlayOnly();
        });
      });
      updateTypeLabels();

      // ===================== Watermark Logic =====================
      let pdfFile = null, pageCount = 0, resultBlob = null;
      let wmImageBytes = null, wmImageType = null;
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileInfo = document.getElementById('file-info');
      const wmOptions = document.getElementById('wm-options');
      const wmBtn = document.getElementById('wm-btn');
      const progressArea = document.getElementById('progress-area');
      const result = document.getElementById('result');
      const downloadBtn = document.getElementById('download-btn');
      const previewArea = document.getElementById('preview-area');

      PDFTools.initDropZone(dropZone, fileInput, async (newFiles) => {
        pdfFile = newFiles[0];
        const { PDFDocument } = await PDFTools.ensurePDFLib();
        const bytes = await pdfFile.arrayBuffer();
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        resultBlob = null;
        document.getElementById('file-name-display').textContent = pdfFile.name;
        document.getElementById('file-meta-display').textContent = PDFTools.formatBytes(pdfFile.size) + ' • ' + pageCount + ' ' + T.pageCount;
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        wmOptions.classList.remove('hidden');
        result.classList.add('hidden');
        await updatePreview();
      }, { accept: '.pdf', multiple: false });

      document.getElementById('remove-file').addEventListener('click', () => {
        pdfFile = null; resultBlob = null; baseCanvas = null; previewCanvas = null; cachedWmImage = null;
        fileInfo.classList.add('hidden');
        wmOptions.classList.add('hidden');
        dropZone.classList.remove('hidden');
        result.classList.add('hidden');
        previewArea.innerHTML = '';
      });

      document.getElementById('wm-image').addEventListener('change', async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        wmImageType = f.type;
        const buf = await f.arrayBuffer();
        wmImageBytes = buf;
        cachedWmImage = new Image();
        cachedWmImage.src = URL.createObjectURL(new Blob([buf], { type: wmImageType }));
        await new Promise(r => cachedWmImage.onload = r);
        updateOverlayOnly();
      });

      // Live preview: cache base page render, only redraw watermark overlay on slider change
      let baseCanvas = null;
      let previewCanvas = null;
      let cachedWmImage = null;

      async function renderBasePage() {
        const pdfjs = await PDFTools.ensurePDFJS();
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buf }).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 0.6 });
        baseCanvas = document.createElement('canvas');
        baseCanvas.width = viewport.width;
        baseCanvas.height = viewport.height;
        const ctx = baseCanvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        if (!previewCanvas || previewCanvas.width !== baseCanvas.width) {
          previewCanvas = document.createElement('canvas');
          previewCanvas.width = baseCanvas.width;
          previewCanvas.height = baseCanvas.height;
          previewCanvas.className = 'rounded-lg shadow-md bg-white';
          previewArea.innerHTML = '';
          previewArea.appendChild(previewCanvas);
        }
      }

      function drawWatermarkOverlay() {
        if (!baseCanvas || !previewCanvas) return;
        const ctx = previewCanvas.getContext('2d');
        ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        ctx.drawImage(baseCanvas, 0, 0);
        const wmType = document.querySelector('input[name="wm-type"]:checked').value;
        const opacity = parseInt(document.getElementById('wm-opacity').value) / 100;
        const rotation = parseInt(document.getElementById('wm-rotation').value);
        const position = document.getElementById('wm-position').value;
        const color = document.getElementById('wm-color').value;
        ctx.save();
        ctx.globalAlpha = opacity;
        if (wmType === 'text') {
          const text = document.getElementById('wm-text').value || 'WATERMARK';
          const fontSize = parseInt(document.getElementById('wm-size').value);
          ctx.font = 'bold ' + fontSize + 'px Inter, sans-serif';
          ctx.fillStyle = color;
          const metrics = ctx.measureText(text);
          const tw = metrics.width;
          const th = fontSize;
          let x, y;
          const pad = 40;
          if (position === 'center') { x = previewCanvas.width / 2; y = previewCanvas.height / 2; }
          else if (position === 'top-left') { x = pad + tw / 2; y = pad + th; }
          else if (position === 'top-right') { x = previewCanvas.width - pad - tw / 2; y = pad + th; }
          else if (position === 'bottom-left') { x = pad + tw / 2; y = previewCanvas.height - pad; }
          else if (position === 'bottom-right') { x = previewCanvas.width - pad - tw / 2; y = previewCanvas.height - pad; }
          ctx.translate(x, y);
          ctx.rotate(rotation * Math.PI / 180);
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(text, 0, 0);
        } else if (wmType === 'image' && cachedWmImage) {
          const iw = 200;
          const ih = iw * (cachedWmImage.height / cachedWmImage.width);
          let x, y;
          const pad = 40;
          if (position === 'center') { x = previewCanvas.width / 2 - iw / 2; y = previewCanvas.height / 2 - ih / 2; }
          else if (position === 'top-left') { x = pad; y = pad; }
          else if (position === 'top-right') { x = previewCanvas.width - pad - iw; y = pad; }
          else if (position === 'bottom-left') { x = pad; y = previewCanvas.height - pad - ih; }
          else if (position === 'bottom-right') { x = previewCanvas.width - pad - iw; y = previewCanvas.height - pad - ih; }
          ctx.translate(x + iw / 2, y + ih / 2);
          ctx.rotate(rotation * Math.PI / 180);
          ctx.drawImage(cachedWmImage, -iw / 2, -ih / 2, iw, ih);
        }
        ctx.restore();
      }

      async function updatePreview() {
        if (!pdfFile) return;
        previewArea.innerHTML = '<p class="text-sm text-slate-500">Loading preview...</p>';
        previewCanvas = null;
        await renderBasePage();
        drawWatermarkOverlay();
      }

      function updateOverlayOnly() {
        if (baseCanvas) drawWatermarkOverlay();
      }

      ['wm-text', 'wm-position', 'wm-opacity', 'wm-rotation', 'wm-size', 'wm-color'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateOverlayOnly);
      });

      wmBtn.addEventListener('click', async () => {
        if (!pdfFile) { PDFTools.toast(T.noFile); return; }
        const wmType = document.querySelector('input[name="wm-type"]:checked').value;
        if (wmType === 'text' && !document.getElementById('wm-text').value) { PDFTools.toast(T.noText); return; }
        if (wmType === 'image' && !wmImageBytes) { PDFTools.toast(T.noImage); return; }
        wmBtn.disabled = true;
        result.classList.add('hidden');
        PDFTools.showProgress(progressArea, 10);

        try {
          const { PDFDocument, rgb, degrees } = await PDFTools.ensurePDFLib();
          const bytes = await pdfFile.arrayBuffer();
          const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
          const pages = doc.getPages();
          const opacity = parseInt(document.getElementById('wm-opacity').value) / 100;
          const rotation = parseInt(document.getElementById('wm-rotation').value);
          const position = document.getElementById('wm-position').value;
          const color = document.getElementById('wm-color').value;
          const r = parseInt(color.slice(1, 3), 16) / 255;
          const g = parseInt(color.slice(3, 5), 16) / 255;
          const b = parseInt(color.slice(5, 7), 16) / 255;

          let embeddedImg = null;
          if (wmType === 'image' && wmImageBytes) {
            if (wmImageType === 'image/png') embeddedImg = await doc.embedPng(wmImageBytes);
            else embeddedImg = await doc.embedJpg(wmImageBytes);
          }

          const fontSize = parseInt(document.getElementById('wm-size').value);
          const wmText = document.getElementById('wm-text').value || 'WATERMARK';

          pages.forEach((page, idx) => {
            const { width, height } = page.getSize();
            let x, y;
            const pad = 40;

            if (wmType === 'text') {
              const tw = fontSize * wmText.length * 0.6;
              const th = fontSize;
              if (position === 'center') { x = width / 2; y = height / 2; }
              else if (position === 'top-left') { x = pad + 100; y = height - pad - th / 2; }
              else if (position === 'top-right') { x = width - pad - 100; y = height - pad - th / 2; }
              else if (position === 'bottom-left') { x = pad + 100; y = pad + th / 2; }
              else if (position === 'bottom-right') { x = width - pad - 100; y = pad + th / 2; }

              page.drawText(wmText, {
                x: x - (fontSize * wmText.length * 0.3),
                y: y - fontSize / 2,
                size: fontSize,
                color: rgb(r, g, b),
                opacity,
                rotate: degrees(rotation)
              });
            } else if (wmType === 'image' && embeddedImg) {
              const iw = 200;
              const ih = iw * (embeddedImg.height / embeddedImg.width);
              if (position === 'center') { x = width / 2 - iw / 2; y = height / 2 - ih / 2; }
              else if (position === 'top-left') { x = pad; y = height - pad - ih; }
              else if (position === 'top-right') { x = width - pad - iw; y = height - pad - ih; }
              else if (position === 'bottom-left') { x = pad; y = pad; }
              else if (position === 'bottom-right') { x = width - pad - iw; y = pad; }

              page.drawImage(embeddedImg, {
                x, y, width: iw, height: ih,
                opacity,
                rotate: degrees(rotation)
              });
            }
            PDFTools.showProgress(progressArea, 10 + Math.round((idx / pages.length) * 80));
          });

          const out = await doc.save();
          resultBlob = new Blob([out], { type: 'application/pdf' });
          PDFTools.showProgress(progressArea, 100);
          result.classList.remove('hidden');
          PDFTools.toast(PDFTools.t('common.done'));
        } catch (err) {
          console.error(err);
          PDFTools.toast(PDFTools.t('common.error') + ': ' + err.message);
        } finally {
          wmBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (resultBlob) PDFTools.downloadBlob(resultBlob, pdfFile.name.replace(/\.pdf$/i, '') + '_watermarked.pdf');
      });
    });
  </script>
<script defer src="../js/pettycash-widget.js"></script>

<script defer src="../js/marquee-banner.js"></script>
